<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serrano Campaign Builder v3.1</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
:root {
  --white: #FFFFFF;
  --cream: #FAFAF9;
  --border-light: #EBE9E7;
  --border: #D8D4D0;
  --silver: #BBB4B1;
  --text-soft: #8A8582;
  --carbon: #4B4441;
  --graphite: #333333;
  --shadow: rgba(75, 68, 65, 0.08);
  --danger: #B05A5A;
  --warning: #C89A4E;
  --success: #6B8E6B;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --accent-1: #C8A47E;
  --accent-2: #8FA68E;
  --accent-3: #A59BB5;
  --accent-4: #B89B88;
  --accent-5: #8FA0B5;
}
body { font-family: var(--font); background: var(--cream); color: var(--graphite); margin: 0; padding: 0; line-height: 1.5; -webkit-font-smoothing: antialiased; }
.app { max-width: 860px; margin: 0 auto; min-height: 100vh; background: var(--white); border-left: 0.5px solid var(--border-light); border-right: 0.5px solid var(--border-light); }
.header { padding: 28px 32px 22px; border-bottom: 0.5px solid var(--border-light); background: var(--cream); text-align: center; }
.header img { height: 48px; width: auto; margin-bottom: 10px; }
.header-title { font-size: 20px; font-weight: 400; color: var(--graphite); letter-spacing: -0.3px; margin: 0 0 4px; }
.header-sub { font-size: 12px; color: var(--text-soft); font-weight: 300; letter-spacing: 0.3px; margin: 0; }
.body { padding: 28px 32px; }
.dots { display: flex; gap: 5px; margin-bottom: 24px; }
.dot { flex: 1; height: 2px; background: var(--border-light); border-radius: 1px; transition: all 0.3s; }
.dot.active { background: var(--graphite); }
.dot.done { background: var(--silver); }
.step-label { font-size: 10px; letter-spacing: 2.5px; color: var(--carbon); text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
.step-question { font-size: 20px; font-weight: 400; color: var(--graphite); margin: 0 0 6px; line-height: 1.3; letter-spacing: -0.2px; }
.step-help { font-size: 12px; color: var(--text-soft); margin-bottom: 20px; font-weight: 300; line-height: 1.5; }
.field { margin-bottom: 16px; }
.field-label { display: block; font-size: 10px; color: var(--carbon); margin-bottom: 6px; letter-spacing: 1.5px; font-weight: 600; text-transform: uppercase; }
.field-hint { font-size: 11px; color: var(--text-soft); margin-top: 4px; font-style: italic; }
.field-badge { display: inline-block; font-size: 9px; color: var(--text-soft); background: var(--cream); padding: 2px 8px; border-radius: 10px; margin-left: 6px; letter-spacing: 0.5px; font-weight: 500; text-transform: none; }
.input, .textarea, .select { width: 100%; padding: 11px 14px; background: var(--white); border: 0.5px solid var(--border); border-radius: 8px; color: var(--graphite); font-size: 13px; font-family: inherit; outline: none; transition: all 0.2s; }
.input:focus, .textarea:focus, .select:focus { border-color: var(--carbon); box-shadow: 0 0 0 3px var(--shadow); }
.input::placeholder, .textarea::placeholder { color: var(--silver); font-weight: 300; }
.textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
.radio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.radio-card { border: 0.5px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; transition: all 0.2s; background: var(--white); }
.radio-card:hover { border-color: var(--carbon); }
.radio-card.selected { border: 1.5px solid var(--graphite); background: var(--cream); }
.radio-card-title { font-size: 13px; font-weight: 500; color: var(--graphite); margin-bottom: 3px; }
.radio-card-desc { font-size: 11px; color: var(--text-soft); font-weight: 300; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { padding: 6px 12px; background: var(--white); border: 0.5px solid var(--border); border-radius: 16px; font-size: 11px; color: var(--text-soft); cursor: pointer; transition: all 0.2s; user-select: none; }
.chip:hover { border-color: var(--carbon); color: var(--carbon); }
.chip.active { background: var(--graphite); border-color: var(--graphite); color: var(--white); font-weight: 500; }
.pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; background: var(--cream); border: 0.5px solid var(--border-light); border-radius: 12px; font-size: 11px; color: var(--text-soft); margin-top: 8px; }
.pill-dot { width: 4px; height: 4px; background: var(--carbon); border-radius: 50%; }
.summary { background: var(--cream); border: 0.5px solid var(--border-light); border-radius: 10px; padding: 14px 16px; font-size: 12px; color: var(--text-soft); margin-top: 16px; }
.summary strong { color: var(--graphite); font-weight: 500; }
.campaign-card { background: var(--cream); border: 0.5px solid var(--border-light); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.campaign-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; margin-bottom: 12px; border-bottom: 0.5px solid var(--border-light); }
.campaign-title { font-size: 13px; font-weight: 500; color: var(--graphite); }
.btn-link { background: none; border: none; color: var(--text-soft); font-size: 11px; cursor: pointer; font-family: inherit; padding: 4px 8px; border-radius: 4px; transition: all 0.15s; }
.btn-link:hover { color: var(--graphite); background: var(--white); }
.btn-danger { color: var(--danger); }
.btn-danger:hover { color: #8E4040; background: #FEF6F6; }
.conjunto-card { background: var(--white); border: 0.5px solid var(--border-light); border-radius: 10px; padding: 14px; margin-bottom: 10px; position: relative; border-left: 3px solid var(--accent-1); transition: all 0.2s; }
.conjunto-card[data-idx="0"] { border-left-color: var(--accent-1); }
.conjunto-card[data-idx="1"] { border-left-color: var(--accent-2); }
.conjunto-card[data-idx="2"] { border-left-color: var(--accent-3); }
.conjunto-card[data-idx="3"] { border-left-color: var(--accent-4); }
.conjunto-card[data-idx="4"] { border-left-color: var(--accent-5); }
.conjunto-card[data-idx="5"] { border-left-color: var(--accent-1); }
.conjunto-card[data-idx="6"] { border-left-color: var(--accent-2); }
.conjunto-card[data-idx="7"] { border-left-color: var(--accent-3); }
.conjunto-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 0.5px solid var(--border-light); }
.conjunto-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 14px; font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.conjunto-badge[data-idx="0"] { background: rgba(200, 164, 126, 0.14); color: #8b6a48; }
.conjunto-badge[data-idx="1"] { background: rgba(143, 166, 142, 0.14); color: #5a7558; }
.conjunto-badge[data-idx="2"] { background: rgba(165, 155, 181, 0.14); color: #6b6080; }
.conjunto-badge[data-idx="3"] { background: rgba(184, 155, 136, 0.14); color: #7f6450; }
.conjunto-badge[data-idx="4"] { background: rgba(143, 160, 181, 0.14); color: #5a6d85; }
.conjunto-badge[data-idx="5"] { background: rgba(200, 164, 126, 0.14); color: #8b6a48; }
.conjunto-badge[data-idx="6"] { background: rgba(143, 166, 142, 0.14); color: #5a7558; }
.conjunto-badge[data-idx="7"] { background: rgba(165, 155, 181, 0.14); color: #6b6080; }
.conjunto-title { font-size: 12px; font-weight: 500; color: var(--graphite); letter-spacing: 0.5px; }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.mini-label { font-size: 9px; color: var(--text-soft); margin-bottom: 3px; letter-spacing: 0.8px; font-weight: 500; text-transform: uppercase; }
.mini-input, .mini-select { width: 100%; padding: 7px 10px; background: var(--cream); border: 0.5px solid var(--border); border-radius: 6px; font-size: 11px; color: var(--graphite); font-family: inherit; outline: none; transition: all 0.2s; }
.mini-input:focus, .mini-select:focus { background: var(--white); border-color: var(--carbon); }
.pieza-card { background: var(--cream); border: 0.5px solid var(--border-light); border-radius: 8px; padding: 12px; margin-bottom: 8px; transition: all 0.2s; }
.pieza-card.reserva { border-style: dashed; border-color: var(--silver); }
.pieza-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.pieza-title { font-size: 11px; font-weight: 500; color: var(--graphite); letter-spacing: 0.3px; }
.pieza-badge { font-size: 8px; padding: 2px 7px; border-radius: 8px; letter-spacing: 1px; font-weight: 600; text-transform: uppercase; }
.pieza-badge.activa { background: var(--graphite); color: var(--white); }
.pieza-badge.reserva { background: var(--silver); color: var(--white); }
.btn-add-dashed { width: 100%; padding: 10px; background: transparent; border: 1px dashed var(--border); border-radius: 8px; color: var(--text-soft); font-size: 11px; font-family: inherit; cursor: pointer; letter-spacing: 0.5px; font-weight: 500; transition: all 0.2s; margin-top: 6px; }
.btn-add-dashed:hover { border-color: var(--carbon); color: var(--carbon); background: var(--cream); }
.btn-add-dashed.primary { border-width: 1.5px; color: var(--carbon); font-weight: 500; padding: 12px; }
.btn-duplicate { width: 100%; padding: 9px; background: var(--white); border: 0.5px solid var(--graphite); border-radius: 8px; color: var(--graphite); font-size: 11px; font-family: inherit; cursor: pointer; letter-spacing: 0.5px; font-weight: 500; transition: all 0.2s; margin-top: 6px; }
.btn-duplicate:hover { background: var(--graphite); color: var(--white); }
.team-row { display: grid; grid-template-columns: 110px 1fr 24px; gap: 6px; margin-bottom: 5px; align-items: center; }
.team-row input { padding: 7px 9px; border: 0.5px solid var(--border); border-radius: 5px; font-size: 11px; font-family: inherit; color: var(--graphite); outline: none; transition: all 0.15s; background: var(--white); }
.team-row input:focus { border-color: var(--carbon); }
.footer { padding: 18px 32px; background: var(--cream); border-top: 0.5px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
.counter { font-size: 11px; color: var(--silver); letter-spacing: 0.5px; }
.btn-group { display: flex; gap: 8px; }
.btn { padding: 11px 22px; border-radius: 8px; font-size: 11px; letter-spacing: 1.5px; font-weight: 500; font-family: inherit; cursor: pointer; text-transform: uppercase; transition: all 0.2s; border: none; }
.btn-secondary { background: transparent; border: 0.5px solid var(--border); color: var(--text-soft); }
.btn-secondary:hover { border-color: var(--carbon); color: var(--carbon); }
.btn-secondary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary { background: var(--graphite); color: var(--white); }
.btn-primary:hover { background: var(--carbon); }
.toggle-group { display: flex; gap: 6px; margin-bottom: 12px; }
.toggle-btn { flex: 1; padding: 10px; background: var(--white); border: 0.5px solid var(--border); border-radius: 8px; font-size: 12px; color: var(--text-soft); cursor: pointer; font-family: inherit; transition: all 0.2s; }
.toggle-btn.active { background: var(--cream); border: 1.5px solid var(--graphite); color: var(--graphite); font-weight: 500; }
.checkbox-wrap { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-soft); margin: 10px 0; }
.checkbox-wrap input { margin: 0; cursor: pointer; }
.prompt-output { background: var(--graphite); color: #E8E5E2; border-radius: 12px; padding: 20px; font-family: 'Menlo', 'Consolas', monospace; font-size: 11px; line-height: 1.7; max-height: 500px; overflow-y: auto; white-space: pre-wrap; word-wrap: break-word; margin: 16px 0; }
.prompt-output::-webkit-scrollbar { width: 8px; }
.prompt-output::-webkit-scrollbar-track { background: transparent; }
.prompt-output::-webkit-scrollbar-thumb { background: var(--carbon); border-radius: 4px; }
.action-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.action-buttons .btn { flex: 1; min-width: 120px; }
.custom-input-inline { margin-top: 6px; padding: 6px 10px; background: var(--white); border: 0.5px solid var(--carbon); border-radius: 6px; font-size: 11px; font-family: inherit; color: var(--graphite); width: 100%; outline: none; }
.copy-success { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--graphite); color: var(--white); padding: 12px 24px; border-radius: 24px; font-size: 12px; font-weight: 500; letter-spacing: 0.5px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); transition: transform 0.3s ease; z-index: 1000; }
.copy-success.visible { transform: translateX(-50%) translateY(0); }
.signature { text-align: center; padding: 16px 32px; border-top: 0.5px solid var(--border-light); font-size: 10px; color: var(--silver); letter-spacing: 1px; }
.modelo-precio-card { background: var(--cream); border: 0.5px solid var(--border-light); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; transition: all 0.2s; }
.modelo-precio-card.selected { background: var(--white); border: 1px solid var(--graphite); }
.modelo-precio-row { display: flex; align-items: center; gap: 12px; }
.modelo-checkbox { width: 18px; height: 18px; border-radius: 4px; border: 1px solid var(--border); background: var(--white); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; font-size: 11px; color: var(--white); transition: all 0.2s; }
.modelo-checkbox.checked { background: var(--graphite); border-color: var(--graphite); }
.modelo-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--graphite); }
.modelo-name.unselected { color: var(--text-soft); }
.price-inputs { display: flex; gap: 6px; align-items: center; }
.price-input { width: 90px; padding: 6px 10px; border: 0.5px solid var(--border); border-radius: 6px; font-size: 11px; font-family: inherit; color: var(--graphite); text-align: right; outline: none; background: var(--white); }
.price-input:focus { border-color: var(--carbon); }
.price-input::placeholder { color: var(--silver); }
.price-label-inline { font-size: 9px; color: var(--text-soft); letter-spacing: 0.5px; }
.budget-warning { background: rgba(176, 90, 90, 0.08); border: 0.5px solid var(--danger); color: var(--danger); padding: 10px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; margin-top: 8px; }
.budget-ok { background: rgba(107, 142, 107, 0.08); border: 0.5px solid var(--success); color: var(--success); padding: 10px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; margin-top: 8px; }
@media (max-width: 640px) {
  .app { border: none; }
  .header { padding: 22px 20px 18px; }
  .header img { height: 40px; }
  .body { padding: 22px 20px; }
  .footer { padding: 16px 20px; flex-direction: column; gap: 12px; }
  .footer .btn-group { width: 100%; }
  .footer .btn { flex: 1; }
  .radio-grid { grid-template-columns: 1fr; }
  .row-2, .row-3 { grid-template-columns: 1fr; }
  .team-row { grid-template-columns: 100px 1fr 24px; }
  .price-inputs { flex-direction: column; align-items: stretch; gap: 4px; }
  .price-input { width: 100%; text-align: left; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <img src="logo.png" alt="Serrano Group">
    <div class="header-title">Campaign Builder</div>
    <div class="header-sub">Briefs, guiones y copy para Meta Ads</div>
  </div>
  <div class="body" id="body"></div>
  <div class="footer">
    <div class="counter" id="counter">Paso 1 de 7</div>
    <div class="btn-group">
      <button class="btn btn-secondary" id="btnBack" onclick="goBack()">← Atrás</button>
      <button class="btn btn-primary" id="btnNext" onclick="goNext()">Continuar →</button>
    </div>
  </div>
  <div class="signature">SERRANO GROUP · Campaign Builder v3.1</div>
</div>
<div class="copy-success" id="copySuccess">Copiado al portapapeles</div>

<script>
// ============================================
// DATA · CORRECCIONES APLICADAS
// ============================================
const MODELOS_BASE = [
  "NB 530", "NB 9060", "Nike V2K", "On Cloud",
  "Adidas Adizero", "Adidas Ultraboost", "Adidas Samba",
  "Nike Free Metcon", "Nike Zoom", "Asics"
];

const EVENTOS_ESTACIONALES = [
  { mes: "Enero", nombre: "Reset del año" },
  { mes: "Febrero", nombre: "San Valentín" },
  { mes: "Marzo", nombre: "Día de la Mujer" },
  { mes: "Mayo", nombre: "Día de la Madre" },
  { mes: "Junio", nombre: "Día del Padre" },
  { mes: "Junio", nombre: "Primatón mitad de año" },
  { mes: "Agosto", nombre: "Regreso a clase" },
  { mes: "Septiembre", nombre: "Amor y Amistad" },
  { mes: "Octubre", nombre: "Halloween" },
  { mes: "Noviembre", nombre: "Black Friday" },
  { mes: "Diciembre", nombre: "Primatón fin de año" }
];

const ANGULOS_BASE = [
  "Problema / Dolor",
  "Beneficios",
  "Prueba social",
  "Aspiracional / Funcional",
  "Confianza"
];

const NARRATIVAS_BASE = [
  "Testimonio", "Problema-Solución", "Unboxing", "Antes-Después",
  "Oferta directa", "Tutorial / Cómo usar", "Founder story", "Reviews", "Modo de uso"
];

// #4: "Video in-house" → "Videos por nosotros"
const TIPOS_PIEZA = ["Video UGC", "Videos por nosotros", "Imagen estática", "Carrusel"];

// #8: Formatos de imagen/video
const FORMATOS = ["9:16", "1:1", "4:5"];

const ESTRUCTURAS_COPY = [
  { nombre: "PAS", label: "PAS · Problema-Agitación-Solución" },
  { nombre: "AIDA", label: "AIDA · Atención-Interés-Deseo-Acción" },
  { nombre: "FAB", label: "FAB · Características-Ventajas-Beneficios" },
  { nombre: "BAB", label: "BAB · Antes-Después-Puente" },
  { nombre: "4U", label: "4U · Útil-Urgente-Único-Específico" },
  { nombre: "Storytelling", label: "Storytelling · Narrativa con historia" }
];

const OBJETIVOS_META = [
  "Reconocimiento", "Tráfico", "Interacción",
  "Clientes potenciales", "Promoción de la app", "Ventas"
];

const TIPOS_TRAFICO = ["Frío", "Tibio", "Caliente"];
// #2: "Total" → "Decisión"
const NIVELES_CONCIENCIA = ["Inconsciente", "Problema", "Solución", "Producto", "Decisión"];
const MOTIVOS = ["Emocional", "Racional", "Social"];
// #3: Públicos corregidos
const PUBLICOS = ["Segmentación abierta", "Advantage+", "Retargeting", "Públicos similares", "Intereses"];

// ============================================
// ESTADO GLOBAL
// ============================================
const state = {
  currentStep: 1,
  empresa: "",
  // Paso 2 · #7: Campos extendidos
  nombreCampana: "",
  contextoCampana: "",
  tipoCampana: "",
  eventoEstacional: "",
  eventoCustom: "",
  objetivoCampana: "",
  publicoObjetivo: "",
  insightMensajeClave: "",
  queNOhacer: "",
  tonoYestilo: "",
  llamadaAccion: "",
  propuestasValor: "",
  // Paso 3
  tipoOferta: "",
  otraOferta: "",
  contextoOferta: "",
  // Paso 4 · #12: Modelos con precios
  modelosSeleccionados: [],
  modelosCustom: [],
  preciosModelos: {}, // { "NB 530": { antes: "189900", ahora: "169900" } }
  // Paso 5
  objetivo: "",
  // #6: ABO/CBO
  tipoPresupuesto: "ABO",
  campanas: [],
  angulosPersonalizados: [],
  narrativasCustom: [],
  tiposPiezaCustom: [],
  // Paso 6
  presupuestoModo: "mensual",
  presupuestoValor: "",
  fechaInicio: "",
  fechaFin: "",
  sinFechaFin: false,
  // Paso 7
  equipo: [
    { rol: "CEO", email: "Administrativo@tennispremiumcol.com" },
    { rol: "Dir. creativa", email: "creativo@tennispremiumcol.com" },
    { rol: "Diseñador", email: "diseno@tennispremiumcol.com" },
    { rol: "Trafficker", email: "Trafico@tennispremiumcol.com" },
    { rol: "Community", email: "Community@tennispremiumcol.com" }
  ]
};

// ============================================
// HELPERS
// ============================================
function getAllModelos() { return [...MODELOS_BASE, ...state.modelosCustom]; }
function getAllAngulos() { return [...ANGULOS_BASE, ...state.angulosPersonalizados]; }
function getAllNarrativas() { return [...NARRATIVAS_BASE, ...state.narrativasCustom]; }
function getAllTiposPieza() { return [...TIPOS_PIEZA, ...state.tiposPiezaCustom]; }

function newPieza(estado = "activa") {
  return {
    id: "P" + Math.random().toString(36).substr(2, 5).toUpperCase(),
    estado: estado,
    modelo: "", tipoPieza: "", formato: "", carruselSlides: 5,
    angulo: "", trafico: "", conciencia: "", motivo: "",
    narrativa: "", estructuraCopy: "",
    _customs: {}
  };
}
function newConjunto(nombre = "") {
  return {
    id: "C" + Math.random().toString(36).substr(2, 5).toUpperCase(),
    nombre: nombre, publico: "", publicoCustom: "",
    porcentaje: 33, piezas: []
  };
}
function newCampana(nombre = "") {
  return {
    id: "CA" + Math.random().toString(36).substr(2, 5).toUpperCase(),
    nombre: nombre,
    conjuntos: [newConjunto()]
  };
}
function formatMoney(num) {
  if (!num) return "0";
  return new Intl.NumberFormat('es-CO').format(parseInt(num));
}
function parseMoney(str) { return String(str).replace(/[^\d]/g, ""); }
function escapeHTML(str) {
  if (!str && str !== 0) return "";
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}
function escapeAttr(str) { return String(str).replace(/'/g, "\\'").replace(/"/g, "&quot;"); }

// #1: Dropdown con título como placeholder + opción "+ Otro"
function selectPlaceholder(title, options, currentValue, onChangeCode, allowCustom = true) {
  const hasCustom = currentValue && !options.includes(currentValue) && currentValue !== "__custom__";
  const selectValue = hasCustom ? "__custom__" : currentValue;
  let html = `<select class="mini-select" onchange="${onChangeCode}">`;
  html += `<option value="" ${!selectValue ? "selected" : ""}>${title}</option>`;
  options.forEach(opt => {
    html += `<option value="${escapeAttr(opt)}" ${selectValue === opt ? "selected" : ""}>${escapeHTML(opt)}</option>`;
  });
  if (allowCustom) {
    html += `<option value="__custom__" ${selectValue === "__custom__" ? "selected" : ""}>+ Otro...</option>`;
  }
  html += `</select>`;
  return html;
}

// ============================================
// RENDER
// ============================================
function render() {
  const step = state.currentStep;
  document.getElementById("counter").textContent = `Paso ${step} de 7`;
  document.getElementById("btnBack").disabled = step === 1;
  document.getElementById("btnNext").textContent = step === 7 ? "Generar prompt →" : "Continuar →";

  const body = document.getElementById("body");
  let html = renderDots(step);
  if (step === 1) html += renderStep1();
  else if (step === 2) html += renderStep2();
  else if (step === 3) html += renderStep3();
  else if (step === 4) html += renderStep4();
  else if (step === 5) html += renderStep5();
  else if (step === 6) html += renderStep6();
  else if (step === 7) html += renderStep7();
  else if (step === 8) html += renderPromptOutput();
  body.innerHTML = html;

  if (step === 8) {
    document.getElementById("btnNext").style.display = "none";
    document.getElementById("btnBack").textContent = "← Editar";
  } else {
    document.getElementById("btnNext").style.display = "";
    document.getElementById("btnBack").textContent = "← Atrás";
  }
}

function renderDots(step) {
  let dots = '<div class="dots">';
  for (let i = 1; i <= 7; i++) {
    let cls = "dot";
    if (i === step) cls += " active";
    else if (i < step) cls += " done";
    dots += `<div class="${cls}"></div>`;
  }
  return dots + '</div>';
}

function renderModeloPrecio(m) {
  const selected = state.modelosSeleccionados.includes(m);
  const precios = state.preciosModelos[m] || { antes: "", ahora: "" };
  return `
    <div class="modelo-precio-card ${selected ? "selected" : ""}">
      <div class="modelo-precio-row">
        <div class="modelo-checkbox ${selected ? "checked" : ""}" onclick="toggleModelo('${escapeAttr(m)}')">
          ${selected ? "✓" : ""}
        </div>
        <div class="modelo-name ${!selected ? "unselected" : ""}">${escapeHTML(m)}</div>
        ${selected ? `
          <div class="price-inputs">
            <span class="price-label-inline">Antes</span>
            <input type="text" class="price-input"
              value="${precios.antes ? '$' + formatMoney(precios.antes) : ''}"
              placeholder="$0"
              oninput="updatePrecio('${escapeAttr(m)}', 'antes', this.value); this.value = this.value ? '$' + formatMoney(parseMoney(this.value)) : ''">
            <span class="price-label-inline">Ahora</span>
            <input type="text" class="price-input"
              value="${precios.ahora ? '$' + formatMoney(precios.ahora) : ''}"
              placeholder="$0"
              oninput="updatePrecio('${escapeAttr(m)}', 'ahora', this.value); this.value = this.value ? '$' + formatMoney(parseMoney(this.value)) : ''">
          </div>
        ` : `<div style="font-size: 10px; color: var(--silver); font-style: italic;">Marca para configurar precio</div>`}
      </div>
    </div>
  `;
}

function toggleModelo(nombre) {
  const idx = state.modelosSeleccionados.indexOf(nombre);
  if (idx >= 0) {
    state.modelosSeleccionados.splice(idx, 1);
    delete state.preciosModelos[nombre];
  } else {
    state.modelosSeleccionados.push(nombre);
    state.preciosModelos[nombre] = { antes: "", ahora: "" };
  }
  render();
}

function updatePrecio(modelo, tipo, valor) {
  if (!state.preciosModelos[modelo]) state.preciosModelos[modelo] = { antes: "", ahora: "" };
  state.preciosModelos[modelo][tipo] = parseMoney(valor);
}

function agregarModelo() {
  const input = document.getElementById("nuevoModelo");
  const valor = input.value.trim();
  if (!valor) return;
  if (!getAllModelos().includes(valor)) {
    state.modelosCustom.push(valor);
    state.modelosSeleccionados.push(valor);
    state.preciosModelos[valor] = { antes: "", ahora: "" };
  }
  input.value = "";
  render();
}

function renderCampana(camp, ci) {
  // #11: Validación de %
  let sumaPorc = 0;
  camp.conjuntos.forEach(cj => sumaPorc += (parseInt(cj.porcentaje) || 0));
  const showPorc = state.tipoPresupuesto === "ABO";
  
  let porcAlert = "";
  if (showPorc && camp.conjuntos.length > 0) {
    if (sumaPorc === 100) {
      porcAlert = `<div class="budget-ok">✓ Presupuesto asignado: 100% (correcto)</div>`;
    } else {
      const diff = 100 - sumaPorc;
      porcAlert = `<div class="budget-warning">⚠ Presupuesto asignado: ${sumaPorc}% · ${diff > 0 ? 'Falta ' + diff + '%' : 'Sobra ' + Math.abs(diff) + '%'}</div>`;
    }
  }

  return `
    <div class="campaign-card">
      <div class="campaign-header">
        <div class="campaign-title">Campaña ${ci + 1}</div>
        ${state.campanas.length > 1 ? `<button class="btn-link btn-danger" onclick="eliminarCampana(${ci})">Eliminar</button>` : ""}

      <div class="field">
        <input type="text" class="input" style="font-size: 12px;"
          placeholder="Nombre de la campaña (ej: DDM 2026 | Ventas)"
          value="${escapeHTML(camp.nombre)}"
          oninput="state.campanas[${ci}].nombre = this.value">
      </div>
      <div class="mini-label">Conjuntos de anuncio</div>
      ${camp.conjuntos.map((conj, cji) => renderConjunto(conj, ci, cji)).join("")}
      <button class="btn-add-dashed" onclick="agregarConjunto(${ci})">+ Agregar conjunto</button>
      ${porcAlert}
      ${state.tipoCampana === "estacional" && camp.conjuntos.length > 1 && camp.conjuntos[0].piezas.length > 0 ? `
        <button class="btn-duplicate" onclick="duplicarPiezas(${ci})">

      ` : ""}
    </div>
  `;
}

  const camp = state.campanas[ci];

function renderResumen() {

  state.campanas.forEach((c, ci) => {

- Fecha inicio: ${state.fechaInicio || "No definida"}

## REGLA ESTRUCTURAL OBLIGATORIA

Cada pieza entregada debe contener DOS bloques separados y claramente etiquetados:
1. GUION DE LA PIEZA (según formato: video, imagen estática, carrusel)
2. COPY DEL AD (Primary Text, Headlines, Descripción, CTA)

AMBOS bloques deben seguir la misma estructura de copywriting indicada (PAS, AIDA, FAB, BAB, 4U o Storytelling).
No mezclar estructuras dentro de una misma pieza.

Referencia obligatoria de estructuras:
- PAS: Problema (dolor visible) → Agitación (consecuencias si no actúa) → Solución (producto + CTA)
- AIDA: Atención (hook) → Interés (dato/promesa) → Deseo (beneficio emocional) → Acción (CTA)
- FAB: Features (atributos) → Advantages (lo que permite) → Benefits (cómo mejora la vida)
- BAB: Before (situación actual) → After (situación deseada) → Bridge (el producto es el puente)
- 4U: Útil + Urgente + Único + Específico
- Storytelling: Personaje identificable + conflicto + transformación + moraleja/CTA

## DIVERSIFICACIÓN DE REGISTROS DE VOZ

NO redactar todas las piezas con el mismo registro. Si hay 4+ piezas, asignar al menos 3 registros distintos:

- Juvenil Gen Z (22-30): "literal", "no les miento", "la verdad", "chicas"
- Coloquial colombiano cálido (30-50): "parce", "ve", "mija/mijo", "pa'", "ome"
- Formal-cálido (35-60): Sin modismos, tono respetuoso, cercano, profesional
- Neutro informativo: Factual, directo, con datos
- Emotivo directo: Tono cálido sin slang, frases cortas, pausas dramáticas
- Cómplice/amiga: "Sé que lo pensaste", "entre nos", "yo también estaba ahí"

Al inicio de cada pieza, etiqueta el registro y justifica en una línea.

## REGLAS LEGALES Y ÉTICAS (NUNCA VIOLAR)

PROHIBIDO ABSOLUTO en copys y guiones:
❌ "original", "originales"
❌ "triple A", "AAA"
❌ "importado", "importados"
❌ "réplica", "imitación", "copia", "fake"
❌ Mencionar marcas competidoras directamente
❌ Inventar cifras sociales ("93 clientes este mes", "miles de mamás felices")
❌ Inventar reviews, testimonios o nombres de clientes
❌ Prometer tiempos de entrega nacionales absolutos
❌ Lenguaje que denigre al comprador ("no seas mal hijo", "deja de ser tacaño")

USAR EN SU LUGAR:
✅ "calidad garantizada"
✅ "materiales premium"
✅ "construcción duradera"
✅ "acabados cuidados"
✅ "garantía Tennispremium"
✅ "estándar premium"
✅ "24-72h en ciudades principales" (con cobertura matizada)

## DIVERSIDAD OBLIGATORIA ENTRE PIEZAS

Aunque varias piezas tengan el mismo ángulo o modelo, el enfoque, la voz, las palabras, las metáforas y los ejemplos DEBEN ser DIFERENTES.

PROHIBIDO:
- Repetir los mismos hooks entre piezas
- Repetir las mismas frases de cierre
- Repetir los mismos CTAs literales
- Repetir la misma estructura de apertura

## DURACIÓN DE VIDEOS
${hayVideos ? `
Los videos deben VARIAR en duración entre piezas (15-60 segundos):
- 15-20 segundos: Óptima para feed y Reels (priorizar cuando se dude)
- 21-30 segundos: Útil para público frío que necesita contexto

- El guion es guía, NO script cerrado

- Máximo 5 bloques de información: hook, producto, precio, oferta, CTA

- Slide 1: Hook fuerte que obligue a deslizar

- Slide final: CTA + precio + oferta

function copiarPrompt() {

  navigator.clipboard.writeText(prompt).then(() => {
    const s = document.getElementById("copySuccess");
    s.classList.add("visible");

    const t = document.createElement("textarea");
    t.value = prompt;
    document.body.appendChild(t);
    t.select();
    document.execCommand("copy");
    document.body.removeChild(t);
    alert("Prompt copiado ✓");
  });
}
function descargarPrompt() {
  const prompt = generarPromptMaestro();
  const fecha = new Date().toISOString().split("T")[0];
  const nombre = (state.nombreCampana || "campana").replace(/[^\w]/g, "_");
  const blob = new Blob([prompt], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${fecha}_${nombre}_serrano_brief.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

function validarPaso(paso) {
  if (paso === 1 && !state.empresa.trim()) return "Ingresa el nombre de la empresa";
  if (paso === 2) {
    if (!state.nombreCampana.trim()) return "Ingresa el nombre de la campaña";
    if (!state.tipoCampana) return "Selecciona evergreen o estacional";
    if (state.tipoCampana === "estacional" && !state.eventoEstacional) return "Selecciona un evento estacional";
    if (state.eventoEstacional === "__custom__" && !state.eventoCustom.trim()) return "Escribe el evento custom";
  }
  if (paso === 3 && !state.tipoOferta) return "Selecciona un tipo de oferta";
  if (paso === 4 && state.modelosSeleccionados.length === 0) return "Selecciona al menos un modelo";
  if (paso === 5) {
    if (!state.objetivo) return "Selecciona el objetivo del brief";
    if (!state.tipoPresupuesto) return "Selecciona ABO o CBO";
    let totalPiezas = 0;
    state.campanas.forEach(c => c.conjuntos.forEach(cj => totalPiezas += cj.piezas.length));
    if (totalPiezas === 0) return "Agrega al menos una pieza a algún conjunto";
    // #11: Validar 100% en ABO
    if (state.tipoPresupuesto === "ABO") {
      for (let ci = 0; ci < state.campanas.length; ci++) {
        const camp = state.campanas[ci];
        let suma = 0;
        camp.conjuntos.forEach(cj => suma += (parseInt(cj.porcentaje) || 0));
        if (suma !== 100) {
          return `El % del presupuesto de la Campaña ${ci + 1} suma ${suma}% — debe sumar 100%`;
        }
      }
    }
  }
  if (paso === 6) {
    if (!state.presupuestoValor) return "Ingresa el presupuesto";
    if (!state.fechaInicio) return "Ingresa la fecha de inicio";
    if (!state.sinFechaFin && !state.fechaFin) return "Ingresa la fecha de fin o marca evergreen";
  }
  return null;
}

function goNext() {
  const err = validarPaso(state.currentStep);
  if (err) { alert("⚠ " + err); return; }
  if (state.currentStep < 7) state.currentStep++;
  else if (state.currentStep === 7) state.currentStep = 8;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function goBack() {
  if (state.currentStep > 1) {
    if (state.currentStep === 8) state.currentStep = 7;
    else state.currentStep--;
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
}
