<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serrano Campaign Builder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f7f7f5; color: #1a1a1a; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-size: 24px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.3px; }
  .header .sub { font-size: 14px; color: #6b6b6b; margin-top: 4px; }
  .card { background: #ffffff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 2rem; margin-bottom: 1rem; }
  .step-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #f0f0ee; }
  .step-title { font-size: 18px; font-weight: 600; color: #1a1a1a; }
  .step-counter { font-size: 13px; color: #6b6b6b; }
  .progress { height: 3px; background: #ebebe8; border-radius: 2px; overflow: hidden; margin-bottom: 1.5rem; }
  .progress-fill { height: 100%; background: #1a1a1a; transition: width 0.35s ease; }
  .description { font-size: 14px; color: #6b6b6b; margin-bottom: 1.25rem; }
  label.field-label { display: block; font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 6px; }
  input[type=text], input[type=number], input[type=date], input[type=url], textarea, select { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #dcdcd9; border-radius: 8px; background: #ffffff; font-family: inherit; color: #1a1a1a; transition: border-color 0.15s; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #1a1a1a; box-shadow: 0 0 0 3px rgba(26,26,26,0.08); }
  textarea { resize: vertical; min-height: 70px; font-family: inherit; }
  .option-btn { width: 100%; text-align: left; padding: 14px 16px; background: #ffffff; border: 1px solid #dcdcd9; border-radius: 10px; cursor: pointer; margin-bottom: 8px; transition: all 0.15s; font-family: inherit; font-size: 14px; color: #1a1a1a; }
  .option-btn:hover { border-color: #1a1a1a; background: #fafafa; }
  .option-btn.selected { border-color: #1a1a1a; background: #f4f4f2; border-width: 2px; padding: 13px 15px; }
  .option-btn .label { font-weight: 500; display: block; margin-bottom: 2px; }
  .option-btn .desc { font-size: 13px; color: #6b6b6b; }
  .option-btn.selected .check { float: right; font-weight: 600; }
  .check-option { display: flex; align-items: center; padding: 12px 14px; border: 1px solid #dcdcd9; border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: all 0.15s; font-size: 14px; background: #ffffff; }
  .check-option:hover { border-color: #1a1a1a; }
  .check-option.selected { background: #f4f4f2; border-color: #1a1a1a; border-width: 2px; padding: 11px 13px; }
  .check-option .box { width: 18px; height: 18px; border: 1.5px solid #7b7b78; border-radius: 4px; margin-right: 12px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; color: #fff; background: #fff; font-weight: 700; }
  .check-option.selected .box { background: #1a1a1a; border-color: #1a1a1a; }
  .btn-row { display: flex; justify-content: space-between; margin-top: 1.5rem; gap: 12px; }
  .btn { padding: 10px 18px; font-size: 14px; font-weight: 500; border-radius: 8px; border: 1px solid #dcdcd9; background: #ffffff; color: #1a1a1a; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn:hover { background: #f4f4f2; border-color: #1a1a1a; }
  .btn.primary { background: #1a1a1a; color: #ffffff; border-color: #1a1a1a; }
  .btn.primary:hover { background: #000; }
  .btn.primary:disabled { background: #a0a09e; border-color: #a0a09e; cursor: not-allowed; }
  .btn.secondary { background: #ffffff; }
  .hidden { display: none; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .budget-summary { padding: 12px; background: #f4f4f2; border-radius: 8px; font-size: 13px; color: #1a1a1a; margin-top: 12px; }
  .add-btn { width: 100%; padding: 12px; background: #ffffff; border: 1.5px dashed #b5b5b0; border-radius: 8px; color: #6b6b6b; font-size: 14px; cursor: pointer; font-family: inherit; margin-top: 8px; transition: all 0.15s; }
  .add-btn:hover { border-color: #1a1a1a; color: #1a1a1a; background: #fafafa; }
  .modelo-item { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-bottom: 8px; align-items: center; }
  .modelo-item input { width: 100%; }
  .remove-btn { background: transparent; border: none; color: #c44; cursor: pointer; font-size: 18px; padding: 4px 8px; font-weight: 500; }
  .remove-btn:hover { color: #900; }
  .email-row { display: grid; grid-template-columns: 110px 1fr auto; gap: 8px; margin-bottom: 8px; align-items: center; }
  .email-row .role { font-size: 13px; color: #6b6b6b; padding: 10px 0; }
  .warning { background: #fff8e6; border: 1px solid #f0c878; color: #8a5a00; padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
  .success { background: #e9f5ec; border: 1px solid #7cb891; color: #1e5b32; padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .success .icon { font-weight: 700; font-size: 15px; }
  .summary-card { background: #f7f7f5; border-radius: 8px; padding: 16px; margin-bottom: 8px; }
  .summary-row { display: flex; padding: 6px 0; border-bottom: 1px solid #ebebe8; font-size: 14px; }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .key { color: #6b6b6b; width: 40%; flex-shrink: 0; }
  .summary-row .val { color: #1a1a1a; font-weight: 500; flex: 1; word-break: break-word; }
  textarea.prompt-output { width: 100%; min-height: 320px; padding: 14px; font-family: Menlo, Monaco, "Courier New", monospace; font-size: 12px; background: #f7f7f5; border: 1px solid #dcdcd9; border-radius: 8px; color: #1a1a1a; line-height: 1.6; }
  .btn-group { display: flex; gap: 8px; margin-top: 12px; }
  .btn-group .btn { flex: 1; }
  .footer { text-align: center; margin-top: 2rem; padding-top: 1rem; font-size: 12px; color: #6b6b6b; }
  .footer a { color: #1a1a1a; text-decoration: none; border-bottom: 1px solid #dcdcd9; }
  .error-text { color: #c44; font-size: 12px; margin-top: 4px; }
  .inline-group { display: flex; gap: 8px; align-items: center; }
  .inline-group input { flex: 1; }
  @media (max-width: 640px) {
    body { padding: 1rem 0.5rem; }
    .card { padding: 1.25rem; }
    .row-2, .row-3 { grid-template-columns: 1fr; }
    .modelo-item { grid-template-columns: 1fr; }
    .email-row { grid-template-columns: 1fr; }
    .email-row .role { padding: 0; }
  }
</style>
</head>
<body>
<div class="container">

<div class="header">
  <h1>Serrano Campaign Builder</h1>
  <div class="sub">Generador de briefs + guiones para campañas de calzado</div>
</div>

<div class="card">
  <div class="step-header">
    <div class="step-title" id="step-title">Empecemos</div>
    <div class="step-counter" id="step-counter">Paso 1 de 13</div>
  </div>

  <div class="progress"><div class="progress-fill" id="progress-fill" style="width:7.7%"></div></div>

  <div id="wizard"></div>

  <div class="btn-row">
    <button class="btn secondary" id="btn-back">← Atrás</button>
    <button class="btn primary" id="btn-next">Siguiente →</button>
  </div>
</div>

<div class="footer">
  <a href="https://github.com/Ads-Tennis-Premium/campaign-builder" target="_blank">Serrano Group</a> · Campaign Builder v2.0
</div>

</div>

<script>
(function(){
  const state = {
    step: 1,
    total: 13,
    data: {
      empresa: '',
      nombreCampana: '',
      ofertaTipo: '',
      ofertaTexto: '',
      ofertaCustom: '',
      presupuestoModo: 'diario',
      presupuestoDiario: 300000,
      presupuestoMensual: 9000000,
      fechaInicio: '',
      fechaFin: '',
      objetivo: '',
      angulos: [],
      angulosCustom: '',
      traficos: [],
      conciencias: [],
      formatos: [],
      formatosCustom: '',
      narrativas: [],
      narrativasCustom: '',
      motivos: [],
      piezasActivas: 10,
      piezasReserva: 6,
      desglose: { ugc: 0, inhouse: 0, estatica: 0, carrusel: 0 },
      modelos: [{ nombre: '', foto: '' }],
      equipo: [
        { rol: 'CEO', email: 'Administrativo@tennispremiumcol.com' },
        { rol: 'Dir. creativa', email: 'creativo@tennispremiumcol.com' },
        { rol: 'Diseñador', email: 'diseno@tennispremiumcol.com' },
        { rol: 'Trafficker', email: 'Trafico@tennispremiumcol.com' },
        { rol: 'Community', email: 'Community@tennispremiumcol.com' }
      ]
    }
  };

  const wiz = document.getElementById('wizard');
  const title = document.getElementById('step-title');
  const counter = document.getElementById('step-counter');
  const bar = document.getElementById('progress-fill');
  const btnBack = document.getElementById('btn-back');
  const btnNext = document.getElementById('btn-next');

  function render(){
    const pct = (state.step / state.total) * 100;
    bar.style.width = pct.toFixed(1) + '%';
    counter.textContent = 'Paso ' + state.step + ' de ' + state.total;
    btnBack.style.visibility = state.step === 1 ? 'hidden' : 'visible';
    btnNext.textContent = state.step === state.total ? 'Generar prompt →' : 'Siguiente →';
    btnNext.disabled = false;
    renderers[state.step]();
  }

  function makeOption(label, desc, selected, onClick){
    const b = document.createElement('button');
    b.className = 'option-btn' + (selected ? ' selected' : '');
    b.innerHTML = '<span class="label">' + label + '</span>' + (desc ? '<span class="desc">' + desc + '</span>' : '') + (selected ? '<span class="check">✓</span>' : '');
    b.onclick = onClick;
    return b;
  }

  function makeCheck(label, desc, selected, onClick){
    const b = document.createElement('div');
    b.className = 'check-option' + (selected ? ' selected' : '');
    b.innerHTML = '<span class="box">' + (selected ? '✓' : '') + '</span><div><div style="font-weight:500;">' + label + '</div>' + (desc ? '<div style="font-size:13px;color:#6b6b6b;">' + desc + '</div>' : '') + '</div>';
    b.onclick = onClick;
    return b;
  }

  const renderers = {
    1: function(){
      title.textContent = 'Nombre de la empresa';
      wiz.innerHTML = '<div class="description">¿Para qué empresa/marca es esta campaña?</div><label class="field-label">Nombre</label><input type="text" id="inp-empresa" value="' + (state.data.empresa || '') + '" placeholder="Ej: Tennispremium, Altagama Premium, Yeeshop" autofocus>';
      document.getElementById('inp-empresa').oninput = function(e){ state.data.empresa = e.target.value; };
    },

    2: function(){
      title.textContent = 'Nombre del brief / campaña';
      wiz.innerHTML = '<div class="description">Nombre que identifica esta campaña específica</div><label class="field-label">Nombre de la campaña</label><input type="text" id="inp-nombre" value="' + (state.data.nombreCampana || '') + '" placeholder="Ej: Día de las Madres 2026, Black Friday, Launch NB 9060" autofocus>';
      document.getElementById('inp-nombre').oninput = function(e){ state.data.nombreCampana = e.target.value; };
    },

    3: function(){
      title.textContent = 'Oferta promocional';
      wiz.innerHTML = '<div class="description">¿Qué oferta manejas en esta campaña?</div>';
      const opts = [
        { val: 'escalonada', label: 'Escalonada por cantidad', desc: '1 par envío gratis · 2 pares -10% · 3 pares -15% · 4+ pares -20%' },
        { val: 'descuento-fijo', label: 'Descuento fijo', desc: 'Un solo porcentaje para toda la colección' },
        { val: '2x1', label: '2x1 o combos', desc: 'Lleva 2 y paga 1, u ofertas combinadas' },
        { val: 'envio-gratis', label: 'Envío gratis', desc: 'Sin descuento, solo envío incluido' },
        { val: 'cuotas', label: 'Financiación destacada', desc: 'Cuotas sin interés con Addi o Sistecrédito' },
        { val: 'custom', label: 'Otra oferta personalizada', desc: 'Describes tú la promoción' }
      ];
      opts.forEach(function(o){
        wiz.appendChild(makeOption(o.label, o.desc, state.data.ofertaTipo === o.val, function(){
          state.data.ofertaTipo = o.val;
          render();
        }));
      });
      if(state.data.ofertaTipo === 'descuento-fijo'){
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.value = state.data.ofertaTexto || '';
        inp.placeholder = 'Ej: 30% descuento en todo';
        inp.style.marginTop = '8px';
        inp.oninput = function(e){ state.data.ofertaTexto = e.target.value; };
        wiz.appendChild(inp);
      }
      if(state.data.ofertaTipo === 'custom'){
        const ta = document.createElement('textarea');
        ta.value = state.data.ofertaCustom || '';
        ta.placeholder = 'Describe con detalle tu oferta';
        ta.style.marginTop = '8px';
        ta.oninput = function(e){ state.data.ofertaCustom = e.target.value; };
        wiz.appendChild(ta);
      }
    },

    4: function(){
      title.textContent = 'Presupuesto';
      wiz.innerHTML = '<div class="description">Elige si prefieres ingresar presupuesto diario o mensual (el otro se calcula)</div>';
      const toggle = document.createElement('div');
      toggle.style.cssText = 'display:flex;gap:8px;margin-bottom:16px;';
      ['diario', 'mensual'].forEach(function(m){
        const b = document.createElement('button');
        b.className = 'option-btn' + (state.data.presupuestoModo === m ? ' selected' : '');
        b.style.cssText = 'flex:1;margin:0;text-align:center;';
        b.innerHTML = '<span class="label">Ingresar ' + m + '</span>';
        b.onclick = function(){ state.data.presupuestoModo = m; render(); };
        toggle.appendChild(b);
      });
      wiz.appendChild(toggle);

      if(state.data.presupuestoModo === 'diario'){
        wiz.insertAdjacentHTML('beforeend', '<label class="field-label">Presupuesto diario (COP)</label><input type="number" id="inp-diario" value="' + state.data.presupuestoDiario + '" step="10000" min="0"><div class="budget-summary" id="budget-sum"></div>');
        const update = function(){
          const v = parseFloat(document.getElementById('inp-diario').value) || 0;
          state.data.presupuestoDiario = v;
          state.data.presupuestoMensual = Math.round(v * 30);
          document.getElementById('budget-sum').innerHTML = 'Mensual equivalente (30 días): <strong>$' + state.data.presupuestoMensual.toLocaleString('es-CO') + ' COP</strong>';
        };
        document.getElementById('inp-diario').oninput = update;
        update();
      } else {
        wiz.insertAdjacentHTML('beforeend', '<label class="field-label">Presupuesto mensual (COP)</label><input type="number" id="inp-mensual" value="' + state.data.presupuestoMensual + '" step="100000" min="0"><div class="budget-summary" id="budget-sum"></div>');
        const update = function(){
          const v = parseFloat(document.getElementById('inp-mensual').value) || 0;
          state.data.presupuestoMensual = v;
          state.data.presupuestoDiario = Math.round(v / 30);
          document.getElementById('budget-sum').innerHTML = 'Diario equivalente (÷ 30): <strong>$' + state.data.presupuestoDiario.toLocaleString('es-CO') + ' COP</strong>';
        };
        document.getElementById('inp-mensual').oninput = update;
        update();
      }

      const dates = document.createElement('div');
      dates.className = 'row-2';
      dates.style.marginTop = '16px';
      dates.innerHTML = '<div><label class="field-label">Fecha inicio</label><input type="date" id="inp-fi" value="' + state.data.fechaInicio + '"></div><div><label class="field-label">Fecha fin</label><input type="date" id="inp-ff" value="' + state.data.fechaFin + '"></div>';
      wiz.appendChild(dates);
      document.getElementById('inp-fi').onchange = function(e){ state.data.fechaInicio = e.target.value; };
      document.getElementById('inp-ff').onchange = function(e){ state.data.fechaFin = e.target.value; };
    },

    5: function(){
      title.textContent = 'Objetivo de la campaña';
      wiz.innerHTML = '<div class="description">¿Qué buscas conseguir con esta campaña?</div>';
      const opts = [
        { val: 'ventas', label: 'Ventas', desc: 'Conversión en compra (optimización Purchase)' },
        { val: 'trafico', label: 'Tráfico', desc: 'Llevar visitantes a tu sitio web o tienda' },
        { val: 'retargeting', label: 'Retargeting', desc: 'Reimpactar visitantes previos para cerrar venta' },
        { val: 'reconocimiento', label: 'Reconocimiento de marca', desc: 'Dar a conocer la marca a audiencias nuevas' }
      ];
      opts.forEach(function(o){
        wiz.appendChild(makeOption(o.label, o.desc, state.data.objetivo === o.val, function(){
          state.data.objetivo = o.val;
          render();
        }));
      });
    },

    6: function(){
      title.textContent = 'Ángulo de venta';
      wiz.innerHTML = '<div class="description">Marca los ángulos que quieres usar (puedes marcar varios)</div>';
      const opts = [
        { val: 'prueba-social', label: 'Prueba social', desc: 'Testimonios, reviews, UGC de clientas' },
        { val: 'aspiracional', label: 'Aspiracional', desc: 'Estilo de vida deseado, estética' },
        { val: 'beneficios', label: 'Beneficios', desc: 'Funcionalidad racional del producto' },
        { val: 'dolor-problema', label: 'Dolor / problema (FOMO)', desc: 'Urgencia, miedo a perder la oferta' },
        { val: 'confianza', label: 'Confianza', desc: 'Originalidad, garantía, historia del fundador' }
      ];
      opts.forEach(function(o){
        const sel = state.data.angulos.indexOf(o.val) !== -1;
        wiz.appendChild(makeCheck(o.label, o.desc, sel, function(){
          const i = state.data.angulos.indexOf(o.val);
          if(i === -1) state.data.angulos.push(o.val); else state.data.angulos.splice(i, 1);
          render();
        }));
      });
      wiz.insertAdjacentHTML('beforeend', '<label class="field-label" style="margin-top:16px;">Agregar otro ángulo (opcional)</label><input type="text" id="inp-angulos-c" value="' + (state.data.angulosCustom || '') + '" placeholder="Ej: Exclusividad, autoridad, escasez...">');
      document.getElementById('inp-angulos-c').oninput = function(e){ state.data.angulosCustom = e.target.value; };
    },

    7: function(){
      title.textContent = 'Tipo de tráfico';
      wiz.innerHTML = '<div class="description">¿A qué tipo de audiencia le vas a hablar?</div>';
      const opts = [
        { val: 'frio', label: 'Frío', desc: 'No te conocen, nunca compraron en tu marca' },
        { val: 'tibio', label: 'Tibio', desc: 'Han visto tu contenido pero no compraron' },
        { val: 'caliente', label: 'Caliente', desc: 'Visitaron web, vieron producto, o ya compraron' }
      ];
      opts.forEach(function(o){
        const sel = state.data.traficos.indexOf(o.val) !== -1;
        wiz.appendChild(makeCheck(o.label, o.desc, sel, function(){
          const i = state.data.traficos.indexOf(o.val);
          if(i === -1) state.data.traficos.push(o.val); else state.data.traficos.splice(i, 1);
          render();
        }));
      });
    },

    8: function(){
      title.textContent = 'Nivel de conciencia (Schwartz)';
      wiz.innerHTML = '<div class="description">¿Qué tan consciente es el cliente de su problema y tu producto?</div>';
      const opts = [
        { val: 'inconsciente', label: 'Inconsciente', desc: 'No sabe que tiene el problema' },
        { val: 'problema', label: 'Consciente del problema', desc: 'Sabe que tiene un problema pero no sabe la solución' },
        { val: 'solucion', label: 'Consciente de la solución', desc: 'Sabe que hay soluciones pero no conoce tu producto' },
        { val: 'producto', label: 'Consciente del producto', desc: 'Conoce tu producto pero aún no decide' },
        { val: 'total', label: 'Totalmente consciente', desc: 'Listo para comprar, solo necesita empujón' }
      ];
      opts.forEach(function(o){
        const sel = state.data.conciencias.indexOf(o.val) !== -1;
        wiz.appendChild(makeCheck(o.label, o.desc, sel, function(){
          const i = state.data.conciencias.indexOf(o.val);
          if(i === -1) state.data.conciencias.push(o.val); else state.data.conciencias.splice(i, 1);
          render();
        }));
      });
    },

    9: function(){
      title.textContent = 'Formato de pieza';
      wiz.innerHTML = '<div class="description">¿Cómo se produce la pieza? (puedes marcar varios)</div>';
      const opts = [
        { val: 'video-ugc', label: 'Video UGC', desc: 'Grabado por un creador externo (persona real)' },
        { val: 'video-inhouse', label: 'Video in-house', desc: 'Grabado por el equipo en oficina' },
        { val: 'imagen-estatica', label: 'Imagen estática', desc: 'Una sola imagen fija' },
        { val: 'carrusel', label: 'Carrusel', desc: 'Múltiples imágenes deslizables' }
      ];
      opts.forEach(function(o){
        const sel = state.data.formatos.indexOf(o.val) !== -1;
        wiz.appendChild(makeCheck(o.label, o.desc, sel, function(){
          const i = state.data.formatos.indexOf(o.val);
          if(i === -1) state.data.formatos.push(o.val); else state.data.formatos.splice(i, 1);
          render();
        }));
      });
      wiz.insertAdjacentHTML('beforeend', '<label class="field-label" style="margin-top:16px;">Agregar otro formato (opcional)</label><input type="text" id="inp-formatos-c" value="' + (state.data.formatosCustom || '') + '" placeholder="Ej: Reel editado, GIF animado, Story...">');
      document.getElementById('inp-formatos-c').oninput = function(e){ state.data.formatosCustom = e.target.value; };
    },

    10: function(){
      title.textContent = 'Narrativa / tipo de contenido';
      wiz.innerHTML = '<div class="description">¿Qué historia cuenta cada pieza? (puedes marcar varias)</div>';
      const opts = [
        { val: 'testimonio', label: 'Testimonio' },
        { val: 'problema-solucion', label: 'Problema - Solución' },
        { val: 'unboxing', label: 'Unboxing' },
        { val: 'antes-despues', label: 'Antes - Después' },
        { val: 'tutorial', label: 'Tutorial' },
        { val: 'oferta-directa', label: 'Oferta directa' },
        { val: 'founder', label: 'Founder / Historia de marca' },
        { val: 'reviews', label: 'Reviews' },
        { val: 'modo-uso', label: 'Modo de uso' }
      ];
      opts.forEach(function(o){
        const sel = state.data.narrativas.indexOf(o.val) !== -1;
        wiz.appendChild(makeCheck(o.label, '', sel, function(){
          const i = state.data.narrativas.indexOf(o.val);
          if(i === -1) state.data.narrativas.push(o.val); else state.data.narrativas.splice(i, 1);
          render();
        }));
      });
      wiz.insertAdjacentHTML('beforeend', '<label class="field-label" style="margin-top:16px;">Agregar otra narrativa (opcional)</label><input type="text" id="inp-narr-c" value="' + (state.data.narrativasCustom || '') + '" placeholder="Ej: Comparativo, mito vs realidad...">');
      document.getElementById('inp-narr-c').oninput = function(e){ state.data.narrativasCustom = e.target.value; };
    },

    11: function(){
      title.textContent = 'Motivo emocional';

      const opts = [
        { val: 'emocional', label: 'Emocional', desc: 'Conecta con sentimientos (amor, gratitud, nostalgia)' },

        { val: 'social', label: 'Social', desc: 'Pertenencia, status, validación de grupo' }
      ];
      opts.forEach(function(o){
        const sel = state.data.motivos.indexOf(o.val) !== -1;
        wiz.appendChild(makeCheck(o.label, o.desc, sel, function(){
          const i = state.data.motivos.indexOf(o.val);
          if(i === -1) state.data.motivos.push(o.val); else state.data.motivos.splice(i, 1);

    12: function(){
      title.textContent = 'Piezas y modelos a promocionar';
      wiz.innerHTML = '<div class="description">Cuántas piezas producir y qué modelos incluir</div>';
      wiz.insertAdjacentHTML('beforeend', '<div class="row-2"><div><label class="field-label">Piezas activas</label><input type="number" id="inp-act" value="' + state.data.piezasActivas + '" min="0"></div><div><label class="field-label">Piezas reserva</label><input type="number" id="inp-res" value="' + state.data.piezasReserva + '" min="0"></div></div>');
      wiz.insertAdjacentHTML('beforeend', '<label class="field-label" style="margin-top:16px;">Desglose por formato</label><div class="row-2"><div><label class="field-label" style="font-weight:400;font-size:12px;">Videos UGC</label><input type="number" id="inp-ugc" value="' + state.data.desglose.ugc + '" min="0"></div><div><label class="field-label" style="font-weight:400;font-size:12px;">Videos in-house</label><input type="number" id="inp-ih" value="' + state.data.desglose.inhouse + '" min="0"></div><div><label class="field-label" style="font-weight:400;font-size:12px;">Estáticas</label><input type="number" id="inp-est" value="' + state.data.desglose.estatica + '" min="0"></div><div><label class="field-label" style="font-weight:400;font-size:12px;">Carruseles</label><input type="number" id="inp-car" value="' + state.data.desglose.carrusel + '" min="0"></div></div><div id="piezas-check" class="budget-summary"></div>');
      
      const checkPiezas = function(){
        state.data.piezasActivas = parseInt(document.getElementById('inp-act').value) || 0;
        state.data.piezasReserva = parseInt(document.getElementById('inp-res').value) || 0;
        state.data.desglose.ugc = parseInt(document.getElementById('inp-ugc').value) || 0;
        state.data.desglose.inhouse = parseInt(document.getElementById('inp-ih').value) || 0;
        state.data.desglose.estatica = parseInt(document.getElementById('inp-est').value) || 0;
        state.data.desglose.carrusel = parseInt(document.getElementById('inp-car').value) || 0;
        const total = state.data.piezasActivas + state.data.piezasReserva;
        const desg = state.data.desglose.ugc + state.data.desglose.inhouse + state.data.desglose.estatica + state.data.desglose.carrusel;
        const el = document.getElementById('piezas-check');
        if(total === desg){
          el.innerHTML = '<strong>Total: ' + total + ' piezas</strong> · Desglose coincide ✓';
          el.style.color = '#1e5b32';
        } else {
          el.innerHTML = '<strong>Total: ' + total + ' · Desglose: ' + desg + '</strong> · No coincide';
          el.style.color = '#8a5a00';
        }
      };
      ['inp-act','inp-res','inp-ugc','inp-ih','inp-est','inp-car'].forEach(function(id){ document.getElementById(id).oninput = checkPiezas; });
      checkPiezas();

      wiz.insertAdjacentHTML('beforeend', '<label class="field-label" style="margin-top:20px;">Modelos a promocionar</label><div id="modelos-list"></div><button class="add-btn" id="btn-add-modelo">+ Agregar modelo</button>');

      const renderModelos = function(){
        const cont = document.getElementById('modelos-list');
        cont.innerHTML = '';
        state.data.modelos.forEach(function(m, idx){
          const item = document.createElement('div');
          item.className = 'modelo-item';
          item.innerHTML = '<input type="text" placeholder="Nombre del modelo" value="' + (m.nombre || '').replace(/"/g,'&quot;') + '" data-idx="' + idx + '" data-key="nombre"><input type="url" placeholder="Link de foto (opcional)" value="' + (m.foto || '').replace(/"/g,'&quot;') + '" data-idx="' + idx + '" data-key="foto"><button class="remove-btn" data-remove="' + idx + '">✕</button>';
          cont.appendChild(item);
        });
        cont.querySelectorAll('input').forEach(function(inp){
          inp.oninput = function(e){
            const idx = parseInt(e.target.getAttribute('data-idx'));
            const key = e.target.getAttribute('data-key');
            state.data.modelos[idx][key] = e.target.value;
          };
        });
        cont.querySelectorAll('[data-remove]').forEach(function(btn){
          btn.onclick = function(e){
            const idx = parseInt(e.target.getAttribute('data-remove'));
            if(state.data.modelos.length > 1) state.data.modelos.splice(idx, 1);
            else state.data.modelos[0] = { nombre: '', foto: '' };
            renderModelos();
          };
        });
      };
      renderModelos();
      document.getElementById('btn-add-modelo').onclick = function(){
        state.data.modelos.push({ nombre: '', foto: '' });
        renderModelos();
      };
    },

    13: function(){
      title.textContent = 'Equipo responsable';
      wiz.innerHTML = '<div class="description">Revisa o edita los emails del equipo que ejecuta la campaña</div><div id="equipo-list"></div><button class="add-btn" id="btn-add-persona">+ Agregar persona</button>';
      const renderEquipo = function(){
        const cont = document.getElementById('equipo-list');

        state.data.equipo.forEach(function(p, idx){
          const r = document.createElement('div');

          r.innerHTML = '<input type="text" placeholder="Rol" value="' + (p.rol || '').replace(/"/g,'&quot;') + '" data-idx="' + idx + '" data-key="rol"><input type="text" placeholder="email@dominio.com" value="' + (p.email || '').replace(/"/g,'&quot;') + '" data-idx="' + idx + '" data-key="email"><button class="remove-btn" data-remove="' + idx + '">✕</button>';

        cont.querySelectorAll('[data-remove]').forEach(function(btn){

      renderEquipo();
      document.getElementById('btn-add-persona').onclick = function(){
        state.data.equipo.push({ rol: '', email: '' });

  function validate(step){
    const d = state.data;
    if(step === 1 && !d.empresa.trim()) return 'Necesito el nombre de la empresa';
    if(step === 2 && !d.nombreCampana.trim()) return 'Necesito el nombre de la campaña';
    if(step === 3 && !d.ofertaTipo) return 'Elige una oferta';
    if(step === 4){
      if(!d.fechaInicio || !d.fechaFin) return 'Necesito fechas de inicio y fin';
      if(new Date(d.fechaFin) < new Date(d.fechaInicio)) return 'La fecha fin no puede ser anterior al inicio';
    }
    if(step === 5 && !d.objetivo) return 'Elige un objetivo';
    if(step === 6 && d.angulos.length === 0 && !d.angulosCustom.trim()) return 'Elige al menos un ángulo';
    if(step === 7 && d.traficos.length === 0) return 'Elige al menos un tipo de tráfico';
    if(step === 8 && d.conciencias.length === 0) return 'Elige al menos un nivel de conciencia';
    if(step === 9 && d.formatos.length === 0 && !d.formatosCustom.trim()) return 'Elige al menos un formato';
    if(step === 10 && d.narrativas.length === 0 && !d.narrativasCustom.trim()) return 'Elige al menos una narrativa';
    if(step === 11 && d.motivos.length === 0) return 'Elige al menos un motivo';
    return null;
  }

  function daysBetween(fi, ff){
    const a = new Date(fi); const b = new Date(ff);
    return Math.max(1, Math.round((b - a) / 86400000) + 1);
  }

  function labelMap(arr, map){
    return arr.map(function(v){ return map[v] || v; }).join(', ');
  }

  function buildPrompt(){
    const d = state.data;
    const days = daysBetween(d.fechaInicio, d.fechaFin);
    const totalBudget = d.presupuestoDiario * days;

    const objMap = { ventas: 'Ventas', trafico: 'Tráfico', retargeting: 'Retargeting', reconocimiento: 'Reconocimiento de marca' };
    const angMap = { 'prueba-social': 'Prueba social', aspiracional: 'Aspiracional', beneficios: 'Beneficios', 'dolor-problema': 'Dolor/problema (FOMO)', confianza: 'Confianza' };
    const trafMap = { frio: 'Frío', tibio: 'Tibio', caliente: 'Caliente' };
    const concMap = { inconsciente: 'Inconsciente', problema: 'Consciente del problema', solucion: 'Consciente de la solución', producto: 'Consciente del producto', total: 'Totalmente consciente' };
    const formMap = { 'video-ugc': 'Video UGC', 'video-inhouse': 'Video in-house', 'imagen-estatica': 'Imagen estática', carrusel: 'Carrusel' };
    const narrMap = { testimonio: 'Testimonio', 'problema-solucion': 'Problema - Solución', unboxing: 'Unboxing', 'antes-despues': 'Antes - Después', tutorial: 'Tutorial', 'oferta-directa': 'Oferta directa', founder: 'Founder / Historia', reviews: 'Reviews', 'modo-uso': 'Modo de uso' };
    const motMap = { emocional: 'Emocional', racional: 'Racional', social: 'Social' };

    let ofertaTxt = '';
    switch(d.ofertaTipo){
      case 'escalonada': ofertaTxt = 'Escalonada por cantidad: 1 par envío gratis / 2 pares -10% / 3 pares -15% / 4+ pares -20%'; break;
      case 'descuento-fijo': ofertaTxt = 'Descuento fijo: ' + (d.ofertaTexto || '(no especificado)'); break;
      case '2x1': ofertaTxt = '2x1 o combos seleccionados'; break;
      case 'envio-gratis': ofertaTxt = 'Envío gratis (sin descuento adicional)'; break;
      case 'cuotas': ofertaTxt = 'Financiación destacada con Addi o Sistecrédito'; break;
      case 'custom': ofertaTxt = d.ofertaCustom || '(no especificado)'; break;
    }

    const angulos = d.angulos.map(function(a){ return angMap[a]; });
    if(d.angulosCustom.trim()) angulos.push(d.angulosCustom.trim());
    const formatos = d.formatos.map(function(f){ return formMap[f]; });
    if(d.formatosCustom.trim()) formatos.push(d.formatosCustom.trim());
    const narrativas = d.narrativas.map(function(n){ return narrMap[n]; });
    if(d.narrativasCustom.trim()) narrativas.push(d.narrativasCustom.trim());

    const modelosTxt = d.modelos.filter(function(m){ return m.nombre.trim(); }).map(function(m){
      return '- ' + m.nombre + (m.foto ? ' (foto: ' + m.foto + ')' : '');
    }).join('\n');

    const equipoTxt = d.equipo.filter(function(p){ return p.email.trim(); }).map(function(p){
      return '- ' + (p.rol || 'Rol sin especificar') + ': ' + p.email;
    }).join('\n');

    let p = '';
    p += '[AGENTE CREADOR DE CAMPAÑAS · SERRANO GROUP]\n';
    p += 'Modo sugerido: plan mode on\n\n';
    p += 'Necesito que generes un PLAN COMPLETO de campaña con BRIEF + MATRIZ DE PIEZAS + GUION POR CADA PIEZA, siguiendo la metodología Serrano Group.\n\n';
    p += '=== IDENTIFICACIÓN ===\n\n';
    p += 'Empresa/Marca: ' + d.empresa + '\n';
    p += 'Campaña: ' + d.nombreCampana + '\n';
    p += 'Fecha inicio: ' + d.fechaInicio + '\n';
    p += 'Fecha fin: ' + d.fechaFin + '\n';
    p += 'Duración: ' + days + ' días\n\n';
    p += '=== PRESUPUESTO ===\n\n';
    p += 'Diario: $' + d.presupuestoDiario.toLocaleString('es-CO') + ' COP\n';
    p += 'Mensual (30d): $' + d.presupuestoMensual.toLocaleString('es-CO') + ' COP\n';
    p += 'Total campaña: $' + totalBudget.toLocaleString('es-CO') + ' COP\n\n';
    p += '=== OFERTA ===\n\n';
    p += ofertaTxt + '\n\n';
    p += '=== OBJETIVO DE CAMPAÑA ===\n\n';
    p += objMap[d.objetivo] + '\n\n';
    p += '=== DIMENSIONES ESTRATÉGICAS (combina para cada pieza) ===\n\n';
    p += 'ÁNGULOS DE VENTA: ' + angulos.join(', ') + '\n';
    p += 'TIPOS DE TRÁFICO: ' + labelMap(d.traficos, trafMap) + '\n';
    p += 'NIVELES DE CONCIENCIA: ' + labelMap(d.conciencias, concMap) + '\n';
    p += 'MOTIVOS EMOCIONALES: ' + labelMap(d.motivos, motMap) + '\n\n';
    p += 'Combina estas dimensiones de forma balanceada en las piezas para maximizar diversidad y cobertura del funnel.\n\n';
    p += '=== PIEZAS ===\n\n';
    p += 'FORMATOS DE PIEZA A USAR: ' + formatos.join(', ') + '\n';
    p += 'NARRATIVAS / TIPOS DE CONTENIDO: ' + narrativas.join(', ') + '\n\n';
    p += 'Total piezas: ' + (d.piezasActivas + d.piezasReserva) + ' (' + d.piezasActivas + ' activas + ' + d.piezasReserva + ' reserva)\n';
    p += 'Desglose por formato:\n';
    if(d.desglose.ugc) p += '- ' + d.desglose.ugc + ' Videos UGC (creators externos)\n';
    if(d.desglose.inhouse) p += '- ' + d.desglose.inhouse + ' Videos in-house\n';
    if(d.desglose.estatica) p += '- ' + d.desglose.estatica + ' Imágenes estáticas\n';
    if(d.desglose.carrusel) p += '- ' + d.desglose.carrusel + ' Carruseles\n';
    p += '\n=== MODELOS A PROMOCIONAR ===\n\n';
    p += modelosTxt + '\n\n';
    p += 'Distribuye los modelos entre las piezas priorizando variedad. Cuando tengas foto disponible, úsala como referencia visual.\n\n';
    p += '=== EQUIPO ===\n\n';
    p += equipoTxt + '\n\n';
    p += '=== QUÉ QUIERO QUE GENERES ===\n\n';
    p += '### 1. BRIEF DE CAMPAÑA\n';
    p += '- Objetivos cuantitativos (ventas mínimas, ROAS objetivo, CPA objetivo ≤$30K / límite $50K)\n';
    p += '- Insight creativo principal (frase potente + contexto emocional)\n';
    p += '- Headline principal + 2 variantes de primary text\n\n';
    p += '### 2. ESTRUCTURA META ADS\n';
    p += '- Nombre de campaña siguiendo convención MARCA | CAMPAÑA | OBJETIVO | TIPO\n';
    p += '- 2 Ad Sets: Advantage+ Shopping (70% adquisición) + Retargeting (30% caliente)\n';
    p += '- Públicos detallados y presupuesto exacto por ad set\n\n';
    p += '### 3. MATRIZ DE LAS ' + (d.piezasActivas + d.piezasReserva) + ' PIEZAS\n';
    p += 'Tabla con columnas: ID, Nombre, Formato, Narrativa, Ángulo, Tráfico, Nivel conciencia, Motivo, Modelo, Responsable, Ad Set, Estado (activa/reserva).\n\n';
    p += '### 4. GUION POR CADA PIEZA\n';
    p += 'Para las ' + (d.piezasActivas + d.piezasReserva) + ' piezas, un guion completo cada una con:\n';
    p += '- HOOK (primeros 3 seg): frase que frene el scroll\n';
    p += '- DESARROLLO: historia/mensaje palabra por palabra\n';
    p += '- CTA (últimos 3-5 seg): llamado con la oferta\n';
    p += '- Notas de producción (props, ubicación, actitud)\n';
    p += '- Copy de caption para el post\n\n';
    p += 'TONO: colombiano natural, conversacional, NO corporativo. UGC debe sentirse auténtico (grabado con celular). Estáticas y carruseles pueden ser más directos.\n\n';
    p += '### 5. CRONOGRAMA\n';
    p += 'Día por día desde hoy hasta el lanzamiento. Responsable y deadline por actividad.\n\n';
    p += '### 6. PLAN DE OPTIMIZACIÓN\n';
    p += 'Días 1-3 no tocar, día 7 primera decisión con umbrales CPA, piezas reserva, cierre.\n\n';
    p += '### 7. TAREAS PARA CLICKUP\n';
    p += 'Tarea padre en lista BRIEFS DE CAMPAÑA + piezas individuales en lista Campañas Activas con todos los campos custom llenos.\n\n';
    p += '---\n';
    p += 'Generado por Serrano Campaign Builder · ' + new Date().toISOString().slice(0,10);
    return p;
  }

  btnNext.onclick = function(){
    const err = validate(state.step);
    if(err){
      const w = document.createElement('div');
      w.className = 'warning';
      w.textContent = err;
      wiz.insertBefore(w, wiz.firstChild);
      setTimeout(function(){ w.remove(); }, 3000);
      return;
    }
    if(state.step < state.total){
      state.step++;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      showOutput();
    }
  };

  btnBack.onclick = function(){
    if(state.step > 1){
      state.step--;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };

  function showOutput(){
    const d = state.data;
    const days = daysBetween(d.fechaInicio, d.fechaFin);
    const total = d.presupuestoDiario * days;
    const promptText = buildPrompt();

    title.textContent = 'Tu prompt está listo';
    counter.textContent = 'Completado';
    bar.style.width = '100%';

    const summaryHTML = '<div class="success"><span class="icon">✓</span><span>Prompt generado correctamente. Cópialo y pégalo en Claude o Claude Code.</span></div>' +
      '<div class="summary-card">' +
        '<div class="summary-row"><div class="key">Empresa</div><div class="val">' + d.empresa + '</div></div>' +
        '<div class="summary-row"><div class="key">Campaña</div><div class="val">' + d.nombreCampana + '</div></div>' +
        '<div class="summary-row"><div class="key">Duración</div><div class="val">' + days + ' días (' + d.fechaInicio + ' → ' + d.fechaFin + ')</div></div>' +
        '<div class="summary-row"><div class="key">Presupuesto total</div><div class="val">$' + total.toLocaleString('es-CO') + ' COP</div></div>' +
        '<div class="summary-row"><div class="key">Total piezas</div><div class="val">' + (d.piezasActivas + d.piezasReserva) + '</div></div>' +
      '</div>' +
      '<label class="field-label" style="margin-top:16px;">Prompt maestro</label>' +
      '<textarea class="prompt-output" id="prompt-out" readonly></textarea>' +
      '<div class="btn-group"><button class="btn primary" id="btn-copy">Copiar prompt</button><button class="btn" id="btn-download">Descargar .txt</button><button class="btn" id="btn-restart">Nueva campaña</button></div>';

    wiz.innerHTML = summaryHTML;
    document.getElementById('prompt-out').value = promptText;

    btnNext.style.display = 'none';
    btnBack.style.display = 'none';

    document.getElementById('btn-copy').onclick = function(){
      const ta = document.getElementById('prompt-out');
      ta.select();
      try {
        document.execCommand('copy');
        document.getElementById('btn-copy').textContent = '✓ Copiado';
        setTimeout(function(){ document.getElementById('btn-copy').textContent = 'Copiar prompt'; }, 2000);
      } catch(e){
        alert('Selecciona el texto manualmente y copia con Cmd+C');
      }
    };

    document.getElementById('btn-download').onclick = function(){
      const blob = new Blob([promptText], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'prompt-' + (d.nombreCampana.replace(/[^a-z0-9]/gi,'-').toLowerCase() || 'campana') + '.txt';
      a.click();
      URL.revokeObjectURL(url);
    };

    document.getElementById('btn-restart').onclick = function(){
      if(confirm('¿Empezar una campaña nueva? Se perderán los datos actuales.')){
        location.reload();
      }
    };
  }

  render();
})();
</script>
