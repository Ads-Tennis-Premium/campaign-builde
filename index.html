<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serrano Campaign Builder v3</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
:root {
  --white: #FFFFFF;
  --cream: #FAFAF9;
  --border-light: #EBE9E7;
  --border: #D8D4D0;
  --silver: #BBB4B1;
  --text-soft: #8A8582;
  --carbon: #4B4441;
  --graphite: #333333;
  --shadow: rgba(75, 68, 65, 0.08);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
body {
  font-family: var(--font);
  background: var(--cream);
  color: var(--graphite);
  margin: 0;
  padding: 0;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.app {
  max-width: 860px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--white);
  border-left: 0.5px solid var(--border-light);
  border-right: 0.5px solid var(--border-light);
}
.header {
  padding: 28px 32px 22px;
  border-bottom: 0.5px solid var(--border-light);
  background: var(--cream);
  text-align: center;
}
.header img { height: 48px; width: auto; margin-bottom: 10px; }
.header-title { font-size: 20px; font-weight: 400; color: var(--graphite); letter-spacing: -0.3px; margin: 0 0 4px; }
.header-sub { font-size: 12px; color: var(--text-soft); font-weight: 300; letter-spacing: 0.3px; margin: 0; }

.body { padding: 28px 32px; }
.dots { display: flex; gap: 5px; margin-bottom: 24px; }
.dot { flex: 1; height: 2px; background: var(--border-light); border-radius: 1px; transition: all 0.3s; }
.dot.active { background: var(--graphite); }
.dot.done { background: var(--silver); }

.step-label { font-size: 10px; letter-spacing: 2.5px; color: var(--carbon); text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
.step-question { font-size: 20px; font-weight: 400; color: var(--graphite); margin: 0 0 6px; line-height: 1.3; letter-spacing: -0.2px; }
.step-help { font-size: 12px; color: var(--text-soft); margin-bottom: 20px; font-weight: 300; line-height: 1.5; }

.field { margin-bottom: 16px; }
.field-label { display: block; font-size: 10px; color: var(--carbon); margin-bottom: 6px; letter-spacing: 1.5px; font-weight: 600; text-transform: uppercase; }
.field-hint { font-size: 11px; color: var(--text-soft); margin-top: 4px; font-style: italic; }
.field-badge { display: inline-block; font-size: 9px; color: var(--text-soft); background: var(--cream); padding: 2px 8px; border-radius: 10px; margin-left: 6px; letter-spacing: 0.5px; font-weight: 500; text-transform: none; }

.input, .textarea, .select {
  width: 100%;
  padding: 11px 14px;
  background: var(--white);
  border: 0.5px solid var(--border);
  border-radius: 8px;
  color: var(--graphite);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: all 0.2s;
}
.input:focus, .textarea:focus, .select:focus {
  border-color: var(--carbon);
  box-shadow: 0 0 0 3px var(--shadow);
}
.input::placeholder, .textarea::placeholder { color: var(--silver); font-weight: 300; }
.textarea { resize: vertical; min-height: 70px; line-height: 1.5; }

.radio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.radio-card {
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--white);
}
.radio-card:hover { border-color: var(--carbon); }
.radio-card.selected { border: 1.5px solid var(--graphite); background: var(--cream); }
.radio-card-title { font-size: 13px; font-weight: 500; color: var(--graphite); margin-bottom: 3px; }
.radio-card-desc { font-size: 11px; color: var(--text-soft); font-weight: 300; }

.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  padding: 6px 12px;
  background: var(--white);
  border: 0.5px solid var(--border);
  border-radius: 16px;
  font-size: 11px;
  color: var(--text-soft);
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.chip:hover { border-color: var(--carbon); color: var(--carbon); }
.chip.active { background: var(--graphite); border-color: var(--graphite); color: var(--white); font-weight: 500; }

.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  background: var(--cream);
  border: 0.5px solid var(--border-light);
  border-radius: 12px;
  font-size: 11px;
  color: var(--text-soft);
  margin-top: 8px;
}
.pill-dot { width: 4px; height: 4px; background: var(--carbon); border-radius: 50%; }

.summary {
  background: var(--cream);
  border: 0.5px solid var(--border-light);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 12px;
  color: var(--text-soft);
  margin-top: 16px;
}
.summary strong { color: var(--graphite); font-weight: 500; }

/* Campaign builder */
.campaign-card {
  background: var(--cream);
  border: 0.5px solid var(--border-light);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}
.campaign-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 10px;
  margin-bottom: 12px;
  border-bottom: 0.5px solid var(--border-light);
}
.campaign-title { font-size: 13px; font-weight: 500; color: var(--graphite); }
.btn-link { background: none; border: none; color: var(--text-soft); font-size: 11px; cursor: pointer; font-family: inherit; padding: 4px 8px; border-radius: 4px; transition: all 0.15s; }
.btn-link:hover { color: var(--graphite); background: var(--white); }
.btn-danger { color: #A44; }
.btn-danger:hover { color: #922; background: #FEF6F6; }

.conjunto-card {
  background: var(--white);
  border: 0.5px solid var(--border-light);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
}
.conjunto-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.conjunto-title { font-size: 12px; font-weight: 500; color: var(--carbon); letter-spacing: 0.5px; }

.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }

.mini-label { font-size: 9px; color: var(--text-soft); margin-bottom: 3px; letter-spacing: 0.8px; font-weight: 500; text-transform: uppercase; }
.mini-input, .mini-select {
  width: 100%;
  padding: 7px 10px;
  background: var(--cream);
  border: 0.5px solid var(--border);
  border-radius: 6px;
  font-size: 11px;
  color: var(--graphite);
  font-family: inherit;
  outline: none;
  transition: all 0.2s;
}
.mini-input:focus, .mini-select:focus {
  background: var(--white);
  border-color: var(--carbon);
}

.pieza-card {
  background: var(--cream);
  border: 0.5px solid var(--border-light);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
  transition: all 0.2s;
}
.pieza-card.reserva { border-style: dashed; border-color: var(--silver); }
.pieza-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.pieza-title { font-size: 11px; font-weight: 500; color: var(--graphite); letter-spacing: 0.3px; }
.pieza-badge { font-size: 8px; padding: 2px 7px; border-radius: 8px; letter-spacing: 1px; font-weight: 600; text-transform: uppercase; }
.pieza-badge.activa { background: var(--graphite); color: var(--white); }
.pieza-badge.reserva { background: var(--silver); color: var(--white); }

.btn-add-dashed {
  width: 100%;
  padding: 10px;
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: 8px;
  color: var(--text-soft);
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.5px;
  font-weight: 500;
  transition: all 0.2s;
  margin-top: 6px;
}
.btn-add-dashed:hover { border-color: var(--carbon); color: var(--carbon); background: var(--cream); }
.btn-add-dashed.primary { border-width: 1.5px; color: var(--carbon); font-weight: 500; padding: 12px; }

.btn-duplicate {
  width: 100%;
  padding: 9px;
  background: var(--white);
  border: 0.5px solid var(--graphite);
  border-radius: 8px;
  color: var(--graphite);
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.5px;
  font-weight: 500;
  transition: all 0.2s;
  margin-top: 6px;
}
.btn-duplicate:hover { background: var(--graphite); color: var(--white); }

/* Team editor */
.team-row { display: grid; grid-template-columns: 110px 1fr 24px; gap: 6px; margin-bottom: 5px; align-items: center; }
.team-row input { padding: 7px 9px; border: 0.5px solid var(--border); border-radius: 5px; font-size: 11px; font-family: inherit; color: var(--graphite); outline: none; transition: all 0.15s; background: var(--white); }
.team-row input:focus { border-color: var(--carbon); }

/* Footer */
.footer {
  padding: 18px 32px;
  background: var(--cream);
  border-top: 0.5px solid var(--border-light);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.counter { font-size: 11px; color: var(--silver); letter-spacing: 0.5px; }
.btn-group { display: flex; gap: 8px; }
.btn {
  padding: 11px 22px;
  border-radius: 8px;
  font-size: 11px;
  letter-spacing: 1.5px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
  border: none;
}
.btn-secondary { background: transparent; border: 0.5px solid var(--border); color: var(--text-soft); }
.btn-secondary:hover { border-color: var(--carbon); color: var(--carbon); }
.btn-secondary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary { background: var(--graphite); color: var(--white); }
.btn-primary:hover { background: var(--carbon); }
.btn-success { background: var(--graphite); color: var(--white); }
.btn-success:hover { background: var(--carbon); }

/* Budget toggle */
.toggle-group { display: flex; gap: 6px; margin-bottom: 12px; }
.toggle-btn {
  flex: 1;
  padding: 10px;
  background: var(--white);
  border: 0.5px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  color: var(--text-soft);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.toggle-btn.active { background: var(--cream); border: 1.5px solid var(--graphite); color: var(--graphite); font-weight: 500; }

.checkbox-wrap { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-soft); margin: 10px 0; }
.checkbox-wrap input { margin: 0; cursor: pointer; }

/* Prompt output */
.prompt-output {
  background: var(--graphite);
  color: #E8E5E2;
  border-radius: 12px;
  padding: 20px;
  font-family: 'Menlo', 'Consolas', monospace;
  font-size: 11px;
  line-height: 1.7;
  max-height: 420px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-wrap: break-word;
  margin: 16px 0;
}
.prompt-output::-webkit-scrollbar { width: 8px; }
.prompt-output::-webkit-scrollbar-track { background: transparent; }
.prompt-output::-webkit-scrollbar-thumb { background: var(--carbon); border-radius: 4px; }

.action-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.action-buttons .btn { flex: 1; min-width: 120px; }

/* Responsive */
@media (max-width: 640px) {
  .app { border: none; }
  .header { padding: 22px 20px 18px; }
  .header img { height: 40px; }
  .body { padding: 22px 20px; }
  .footer { padding: 16px 20px; flex-direction: column; gap: 12px; }
  .footer .btn-group { width: 100%; }
  .footer .btn { flex: 1; }
  .radio-grid { grid-template-columns: 1fr; }
  .row-2, .row-3 { grid-template-columns: 1fr; }
  .team-row { grid-template-columns: 100px 1fr 24px; }
}

/* Structure preview */
.structure-preview {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  background: var(--white);
  border: 0.5px solid var(--border-light);
  border-radius: 8px;
  margin-top: 8px;
}
.structure-preview-col { flex: 1; min-width: 0; }
.structure-preview-col-divider { width: 0.5px; background: var(--border-light); }
.structure-preview-label { font-size: 9px; color: var(--carbon); letter-spacing: 1px; font-weight: 600; margin-bottom: 2px; }
.structure-preview-desc { font-size: 10px; color: var(--text-soft); font-weight: 300; line-height: 1.3; }

/* Copy success */
.copy-success {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--graphite);
  color: var(--white);
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  transition: transform 0.3s ease;
  z-index: 1000;
}
.copy-success.visible { transform: translateX(-50%) translateY(0); }

.signature {
  text-align: center;
  padding: 16px 32px;
  border-top: 0.5px solid var(--border-light);
  font-size: 10px;
  color: var(--silver);
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <img src="logo.png" alt="Serrano Group">
    <div class="header-title">Campaign Builder</div>
    <div class="header-sub">Briefs, guiones y copy para Meta Ads</div>
  </div>

  <div class="body" id="body"></div>

  <div class="footer">
    <div class="counter" id="counter">Paso 1 de 7</div>
    <div class="btn-group">
      <button class="btn btn-secondary" id="btnBack" onclick="goBack()">← Atrás</button>
      <button class="btn btn-primary" id="btnNext" onclick="goNext()">Continuar →</button>
    </div>
  </div>

  <div class="signature">SERRANO GROUP · Campaign Builder v3</div>
</div>

<div class="copy-success" id="copySuccess">Copiado al portapapeles</div>

<script>
// ============================================
// DATA: Modelos, eventos, ángulos, narrativas
// ============================================
const MODELOS_BASE = [
  "NB 530", "NB 9060", "Nike V2K", "On Cloud",
  "Adidas Adizero", "Adidas Ultraboost", "Adidas Samba",
  "Nike Free Metcon", "Nike Zoom", "Asics"
];

const EVENTOS_ESTACIONALES = [
  { mes: "Enero", nombre: "Reset del año" },
  { mes: "Febrero", nombre: "San Valentín" },
  { mes: "Marzo", nombre: "Día de la Mujer" },
  { mes: "Mayo", nombre: "Día de la Madre" },
  { mes: "Junio", nombre: "Día del Padre" },
  { mes: "Junio", nombre: "Primatón mitad de año" },
  { mes: "Agosto", nombre: "Regreso a clase" },
  { mes: "Septiembre", nombre: "Amor y Amistad" },
  { mes: "Octubre", nombre: "Halloween" },
  { mes: "Noviembre", nombre: "Black Friday" },
  { mes: "Diciembre", nombre: "Primatón fin de año" }
];

const ANGULOS_BASE = [
  { nombre: "Problema / Dolor", desc: "Identificar dolor real y presentar producto como solución genuina" },
  { nombre: "Beneficios", desc: "Del producto + de comprar en Tennispremium (servicio, garantía)" },
  { nombre: "Prueba social", desc: "Testimonios, reviews, UGC" },
  { nombre: "Aspiracional / Funcional", desc: "Estilo de vida deseado" },
  { nombre: "Confianza", desc: "Originalidad, garantía, historia fundador" }
];

const NARRATIVAS_BASE = [
  "Testimonio", "Problema-Solución", "Unboxing", "Antes-Después",
  "Oferta directa", "Tutorial / Cómo usar", "Founder story", "Reviews", "Modo de uso"
];

const ESTRUCTURAS_COPY = [
  { nombre: "PAS", label: "PAS · Problema-Agitación-Solución", desc: "P: hook de dolor · A: amplifica · S: producto + CTA" },
  { nombre: "AIDA", label: "AIDA · Atención-Interés-Deseo-Acción", desc: "A: hook · I: dato clave · D: por qué · A: CTA" },
  { nombre: "FAB", label: "FAB · Características-Ventajas-Beneficios", desc: "F: tiene X · A: permite Y · B: mejora tu vida" },
  { nombre: "BAB", label: "BAB · Antes-Después-Puente", desc: "B: situación antes · A: ahora · B: el producto hizo el cambio" },
  { nombre: "4U", label: "4U · Útil-Urgente-Único-Específico", desc: "Útil · Urgente · Único · Específico" },
  { nombre: "Storytelling", label: "Storytelling · Narrativa con historia", desc: "Historia con personaje, problema y transformación" }
];

const OBJETIVOS_META = [
  "Reconocimiento", "Tráfico", "Interacción",
  "Clientes potenciales", "Promoción de la app", "Ventas"
];

const TIPOS_TRAFICO = ["Frío", "Tibio", "Caliente"];
const NIVELES_CONCIENCIA = ["Inconsciente", "Problema", "Solución", "Producto", "Total"];
const MOTIVOS = ["Emocional", "Racional", "Social"];
const PUBLICOS_ESTACIONAL = ["Segmentación abierta", "Advantage+ Shopping", "Retargeting"];

// ============================================
// ESTADO GLOBAL
// ============================================
const state = {
  currentStep: 1,
  // Step 1
  empresa: "",
  // Step 2
  nombreCampana: "",
  contextoCampana: "",
  tipoCampana: "", // "evergreen" | "estacional"
  eventoEstacional: "",
  eventoCustom: "",
  // Step 3
  tipoOferta: "",
  otraOferta: "",
  contextoOferta: "",
  // Step 4
  modelosSeleccionados: [],
  modelosCustom: [],
  // Step 5
  objetivo: "",
  campanas: [],
  angulosPersonalizados: [],
  angulosOcultos: [],
  narrativasCustom: [],
  // Step 6
  presupuestoModo: "mensual",
  presupuestoValor: "",
  fechaInicio: "",
  fechaFin: "",
  sinFechaFin: false,
  // Step 7
  equipo: [
    { rol: "CEO", email: "Administrativo@tennispremiumcol.com" },
    { rol: "Dir. creativa", email: "creativo@tennispremiumcol.com" },
    { rol: "Diseñador", email: "diseno@tennispremiumcol.com" },
    { rol: "Trafficker", email: "Trafico@tennispremiumcol.com" },
    { rol: "Community", email: "Community@tennispremiumcol.com" }
  ]
};

// ============================================
// HELPERS
// ============================================
function getAllModelos() {
  return [...MODELOS_BASE, ...state.modelosCustom];
}
function getAllAngulos() {
  const base = ANGULOS_BASE.filter(a => !state.angulosOcultos.includes(a.nombre));
  const custom = state.angulosPersonalizados.map(n => ({ nombre: n, desc: "Ángulo personalizado" }));
  return [...base, ...custom];
}
function getAllAngulosNombres() {
  return getAllAngulos().map(a => a.nombre);
}
function getAllNarrativas() {
  return [...NARRATIVAS_BASE, ...state.narrativasCustom];
}
function newPieza(estado = "activa") {
  return {
    id: "P" + Math.random().toString(36).substr(2, 5).toUpperCase(),
    estado: estado,
    modelo: "",
    tipoPieza: "",
    carruselSlides: 5,
    angulo: "",
    trafico: "",
    conciencia: "",
    motivo: "",
    narrativa: "",
    estructuraCopy: ""
  };
}
function newConjunto(nombre = "") {
  return {
    id: "C" + Math.random().toString(36).substr(2, 5).toUpperCase(),
    nombre: nombre,
    publico: "",
    porcentaje: 33,
    piezas: []
  };
}
function newCampana(nombre = "") {
  return {
    id: "CA" + Math.random().toString(36).substr(2, 5).toUpperCase(),
    nombre: nombre,
    conjuntos: [newConjunto()]
  };
}
function formatMoney(num) {
  if (!num) return "0";
  return new Intl.NumberFormat('es-CO').format(parseInt(num));
}
function parseMoney(str) {
  return str.replace(/[^\d]/g, "");
}

// ============================================
// RENDER
// ============================================
function render() {
  const step = state.currentStep;
  document.getElementById("counter").textContent = `Paso ${step} de 7`;
  document.getElementById("btnBack").disabled = step === 1;
  document.getElementById("btnNext").textContent = step === 7 ? "Generar prompt →" : "Continuar →";

  const body = document.getElementById("body");
  let html = renderDots(step);

  if (step === 1) html += renderStep1();
  else if (step === 2) html += renderStep2();
  else if (step === 3) html += renderStep3();
  else if (step === 4) html += renderStep4();
  else if (step === 5) html += renderStep5();
  else if (step === 6) html += renderStep6();
  else if (step === 7) html += renderStep7();
  else if (step === 8) html += renderPromptOutput();

  body.innerHTML = html;

  if (step === 8) {
    document.getElementById("btnNext").style.display = "none";
    document.getElementById("btnBack").textContent = "← Editar";
  } else {
    document.getElementById("btnNext").style.display = "";
    document.getElementById("btnBack").textContent = "← Atrás";
  }
}

function renderDots(step) {
  let dots = '<div class="dots">';
  for (let i = 1; i <= 7; i++) {
    let cls = "dot";
    if (i === step) cls += " active";
    else if (i < step) cls += " done";
    dots += `<div class="${cls}"></div>`;
  }
  dots += '</div>';
  return dots;
}

// ============================================
// STEP 1 · EMPRESA
// ============================================
function renderStep1() {
  return `
    <div class="step-label">Paso 1 · Identificación</div>
    <h2 class="step-question">¿Para qué empresa es esta campaña?</h2>
    <p class="step-help">El nombre de la marca que verá reflejada en el brief final y los guiones.</p>
    <div class="field">
      <label class="field-label">Empresa</label>
      <input type="text" class="input" id="empresaInput"
        placeholder="Tennispremium · Altagama Premium · Yeeshop"
        value="${escapeHTML(state.empresa)}"
        oninput="state.empresa = this.value">
    </div>
  `;
}

// ============================================
// STEP 2 · BRIEF
// ============================================
function renderStep2() {
  const isEstacional = state.tipoCampana === "estacional";

function renderStep4() {
  const todosModelos = getAllModelos();
  return `

    <h2 class="step-question">¿Qué modelos usas en esta campaña?</h2>

    <div class="field">

      <div class="chips">
        ${todosModelos.map(m => `
          <div class="chip ${state.modelosSeleccionados.includes(m) ? "active" : ""}"
            onclick="toggleModelo('${escapeAttr(m)}')">
            ${m} ${state.modelosSeleccionados.includes(m) ? "✓" : ""}
          </div>
        `).join("")}
      </div>
    </div>

    <div class="field">
      <label class="field-label">Agregar modelo personalizado</label>
      <div style="display: flex; gap: 6px;">
        <input type="text" class="input" id="nuevoModelo" placeholder="Nombre del modelo nuevo">

      </div>
    </div>

    <div class="pill">
      <span class="pill-dot"></span>
      <span><strong style="color: var(--graphite);">${state.modelosSeleccionados.length}</strong> modelos seleccionados</span>
    </div>

}
function toggleModelo(nombre) {
  const idx = state.modelosSeleccionados.indexOf(nombre);
  if (idx >= 0) state.modelosSeleccionados.splice(idx, 1);
  else state.modelosSeleccionados.push(nombre);
  render();
}
function agregarModelo() {
  const input = document.getElementById("nuevoModelo");
  const valor = input.value.trim();
  if (!valor) return;
  if (!getAllModelos().includes(valor)) {
    state.modelosCustom.push(valor);
    state.modelosSeleccionados.push(valor);
  }
  input.value = "";
  render();
}

// STEP 5 · ESTRUCTURA META ADS
// ============================================
function renderStep5() {
  if (state.campanas.length === 0) {
    state.campanas.push(newCampana(state.nombreCampana || "Campaña 1"));
  }

  return `
    <div class="step-label">Paso 5 · Estructura Meta Ads</div>
    <h2 class="step-question">Construye tu estructura publicitaria</h2>
    <p class="step-help">Define objetivo, campañas, conjuntos y piezas con atributos individuales.</p>

    <div class="field">
      <label class="field-label">Objetivo principal del brief</label>
      <div class="chips">
        ${OBJETIVOS_META.map(o => `
          <div class="chip ${state.objetivo === o ? "active" : ""}"
            onclick="state.objetivo='${o}'; render()">${o}</div>
        `).join("")}
      </div>
    </div>

    <div class="field">
      <label class="field-label">Campañas</label>
      ${state.campanas.map((c, ci) => renderCampana(c, ci)).join("")}
      <button class="btn-add-dashed primary" onclick="agregarCampana()">+ Agregar otra campaña</button>
    </div>

    ${renderResumen()}
  `;
}

function renderCampana(camp, ci) {
  return `
    <div class="campaign-card">
      <div class="campaign-header">
        <div class="campaign-title">Campaña ${ci + 1}</div>
        ${state.campanas.length > 1 ? `<button class="btn-link btn-danger" onclick="eliminarCampana(${ci})">Eliminar</button>` : ""}
      </div>
      <div class="field">
        <input type="text" class="input" style="font-size: 12px;"
          placeholder="Nombre de la campaña (ej: DDM 2026 | Ventas)"
          value="${escapeHTML(camp.nombre)}"
          oninput="state.campanas[${ci}].nombre = this.value">
      </div>

      <div class="mini-label">Conjuntos de anuncio</div>
      ${camp.conjuntos.map((conj, cji) => renderConjunto(conj, ci, cji)).join("")}
      <button class="btn-add-dashed" onclick="agregarConjunto(${ci})">+ Agregar conjunto</button>

      ${state.tipoCampana === "estacional" && camp.conjuntos.length > 1 && camp.conjuntos[0].piezas.length > 0 ? `
        <button class="btn-duplicate" onclick="duplicarPiezas(${ci})">
          🔄 Duplicar piezas del Conjunto 1 a los demás conjuntos
        </button>
      ` : ""}

  `;
}

function renderConjunto(conj, ci, cji) {
  const publicos = state.tipoCampana === "estacional" ? PUBLICOS_ESTACIONAL : ["Advantage+ Shopping", "Segmentación abierta", "Retargeting", "Lookalike", "Intereses específicos"];

  return `
    <div class="conjunto-card">
      <div class="conjunto-header">
        <div class="conjunto-title">Conjunto ${cji + 1}</div>
        ${state.campanas[ci].conjuntos.length > 1 ? `<button class="btn-link btn-danger" onclick="eliminarConjunto(${ci}, ${cji})">Eliminar</button>` : ""}
      </div>
      <div class="row-3">
        <div>
          <div class="mini-label">Nombre</div>
          <input type="text" class="mini-input" placeholder="Prueba social"
            value="${escapeHTML(conj.nombre)}"
            oninput="state.campanas[${ci}].conjuntos[${cji}].nombre = this.value">
        </div>
        <div>
          <div class="mini-label">Público</div>
          <select class="mini-select" onchange="state.campanas[${ci}].conjuntos[${cji}].publico = this.value">
            <option value="">--</option>
            ${publicos.map(p => `<option value="${p}" ${conj.publico === p ? "selected" : ""}>${p}</option>`).join("")}
          </select>
        </div>
        <div>
          <div class="mini-label">% presup.</div>
          <input type="number" class="mini-input" min="0" max="100" placeholder="33"
            value="${conj.porcentaje}"
            oninput="state.campanas[${ci}].conjuntos[${cji}].porcentaje = parseInt(this.value) || 0">
        </div>
      </div>

      <div class="mini-label" style="margin-top: 10px;">Piezas</div>
      ${conj.piezas.map((p, pi) => renderPieza(p, ci, cji, pi)).join("")}
      <button class="btn-add-dashed" onclick="agregarPieza(${ci}, ${cji}, 'activa')" style="margin-top: 4px;">+ Pieza activa</button>
      <button class="btn-add-dashed" onclick="agregarPieza(${ci}, ${cji}, 'reserva')" style="margin-top: 4px;">+ Pieza de reserva</button>
    </div>
  `;
}

function renderPieza(p, ci, cji, pi) {
  const esReserva = p.estado === "reserva";
  const tiposPieza = ["Video UGC", "Video in-house", "Imagen estática", `Carrusel (${p.carruselSlides} slides)`];

  return `
    <div class="pieza-card ${esReserva ? "reserva" : ""}">
      <div class="pieza-header">
        <div>
          <div class="pieza-title">Pieza ${pi + 1} · ${p.id}</div>
        </div>
        <div style="display: flex; gap: 6px; align-items: center;">
          <span class="pieza-badge ${esReserva ? "reserva" : "activa"}">${esReserva ? "Reserva" : "Activa"}</span>
          <button class="btn-link btn-danger" onclick="eliminarPieza(${ci}, ${cji}, ${pi})">×</button>
        </div>
      </div>

      <div class="row-2">
        <div>
          <div class="mini-label">Modelo</div>
          <select class="mini-select" onchange="state.campanas[${ci}].conjuntos[${cji}].piezas[${pi}].modelo = this.value">
            <option value="">--</option>
            ${state.modelosSeleccionados.map(m => `<option value="${m}" ${p.modelo === m ? "selected" : ""}>${m}</option>`).join("")}
          </select>
        </div>
        <div>
          <div class="mini-label">Tipo de pieza</div>
          <select class="mini-select" onchange="cambiarTipoPieza(${ci}, ${cji}, ${pi}, this.value)">
            <option value="">--</option>
            <option value="Video UGC" ${p.tipoPieza === "Video UGC" ? "selected" : ""}>Video UGC</option>
            <option value="Video in-house" ${p.tipoPieza === "Video in-house" ? "selected" : ""}>Video in-house</option>
            <option value="Imagen estática" ${p.tipoPieza === "Imagen estática" ? "selected" : ""}>Imagen estática</option>
            <option value="Carrusel" ${p.tipoPieza === "Carrusel" ? "selected" : ""}>Carrusel</option>
          </select>
        </div>
      </div>

      ${p.tipoPieza === "Carrusel" ? `
        <div class="row-2">
          <div>
            <div class="mini-label">Nº de slides</div>
            <input type="number" class="mini-input" min="2" max="10"
              value="${p.carruselSlides}"
              oninput="state.campanas[${ci}].conjuntos[${cji}].piezas[${pi}].carruselSlides = parseInt(this.value) || 5">
          </div>
          <div></div>
        </div>
      ` : ""}

      <div class="row-2">
        <div>
          <div class="mini-label">Ángulo</div>
          <select class="mini-select" onchange="state.campanas[${ci}].conjuntos[${cji}].piezas[${pi}].angulo = this.value">
            <option value="">--</option>
            ${getAllAngulosNombres().map(a => `<option value="${a}" ${p.angulo === a ? "selected" : ""}>${a}</option>`).join("")}
          </select>
        </div>
        <div>
          <div class="mini-label">Tráfico</div>
          <select class="mini-select" onchange="state.campanas[${ci}].conjuntos[${cji}].piezas[${pi}].trafico = this.value">
            <option value="">--</option>
            ${TIPOS_TRAFICO.map(t => `<option value="${t}" ${p.trafico === t ? "selected" : ""}>${t}</option>`).join("")}
          </select>
        </div>
      </div>

      <div class="row-2">
        <div>
          <div class="mini-label">Conciencia</div>
          <select class="mini-select" onchange="state.campanas[${ci}].conjuntos[${cji}].piezas[${pi}].conciencia = this.value">
            <option value="">--</option>
            ${NIVELES_CONCIENCIA.map(n => `<option value="${n}" ${p.conciencia === n ? "selected" : ""}>${n}</option>`).join("")}
          </select>
        </div>
        <div>
          <div class="mini-label">Motivo</div>
          <select class="mini-select" onchange="state.campanas[${ci}].conjuntos[${cji}].piezas[${pi}].motivo = this.value">
            <option value="">--</option>
            ${MOTIVOS.map(m => `<option value="${m}" ${p.motivo === m ? "selected" : ""}>${m}</option>`).join("")}
          </select>
        </div>
      </div>

      <div class="row-2">
        <div>
          <div class="mini-label">Narrativa</div>
          <select class="mini-select" onchange="state.campanas[${ci}].conjuntos[${cji}].piezas[${pi}].narrativa = this.value">
            <option value="">--</option>
            ${getAllNarrativas().map(n => `<option value="${n}" ${p.narrativa === n ? "selected" : ""}>${n}</option>`).join("")}
          </select>
        </div>
        <div>
          <div class="mini-label">Estructura copy</div>
          <select class="mini-select" onchange="state.campanas[${ci}].conjuntos[${cji}].piezas[${pi}].estructuraCopy = this.value; render()">
            <option value="">--</option>
            ${ESTRUCTURAS_COPY.map(e => `<option value="${e.nombre}" ${p.estructuraCopy === e.nombre ? "selected" : ""}>${e.nombre}</option>`).join("")}
          </select>
        </div>
      </div>

      ${p.estructuraCopy ? renderEstructuraPreview(p.estructuraCopy) : ""}
    </div>
  `;
}

function renderEstructuraPreview(nombre) {
  const e = ESTRUCTURAS_COPY.find(x => x.nombre === nombre);
  if (!e) return "";
  return `
    <div style="margin-top: 8px; padding: 8px 10px; background: var(--white); border: 0.5px solid var(--border-light); border-radius: 6px;">
      <div style="font-size: 9px; color: var(--carbon); letter-spacing: 1px; font-weight: 600; margin-bottom: 3px;">${e.label}</div>
      <div style="font-size: 10px; color: var(--text-soft); line-height: 1.4;">${e.desc}</div>
    </div>
  `;
}

function cambiarTipoPieza(ci, cji, pi, valor) {
  const p = state.campanas[ci].conjuntos[cji].piezas[pi];
  p.tipoPieza = valor;
  render();
}
function agregarCampana() {
  state.campanas.push(newCampana(`Campaña ${state.campanas.length + 1}`));
  render();
}
function eliminarCampana(ci) {
  if (confirm("¿Eliminar esta campaña completa?")) {
    state.campanas.splice(ci, 1);
    render();
  }
}
function agregarConjunto(ci) {
  state.campanas[ci].conjuntos.push(newConjunto());
  render();
}
function eliminarConjunto(ci, cji) {
  if (confirm("¿Eliminar este conjunto y sus piezas?")) {
    state.campanas[ci].conjuntos.splice(cji, 1);
    render();
  }
}
function agregarPieza(ci, cji, estado) {
  state.campanas[ci].conjuntos[cji].piezas.push(newPieza(estado));
  render();
}
function eliminarPieza(ci, cji, pi) {
  state.campanas[ci].conjuntos[cji].piezas.splice(pi, 1);
  render();
}
function duplicarPiezas(ci) {
  const camp = state.campanas[ci];
  const piezasBase = camp.conjuntos[0].piezas;
  if (!piezasBase.length) return alert("El conjunto 1 no tiene piezas para duplicar.");
  if (!confirm(`¿Copiar las ${piezasBase.length} piezas del Conjunto 1 a los demás conjuntos? (Se reemplazan las piezas actuales de los otros conjuntos)`)) return;
  for (let i = 1; i < camp.conjuntos.length; i++) {
    camp.conjuntos[i].piezas = piezasBase.map(p => ({
      ...p,
      id: "P" + Math.random().toString(36).substr(2, 5).toUpperCase()
    }));
  }
  render();
}
function renderResumen() {
  let totalCamp = state.campanas.length;
  let totalConj = 0, totalPiezas = 0, totalActivas = 0, totalReserva = 0;
  state.campanas.forEach(c => {
    totalConj += c.conjuntos.length;
    c.conjuntos.forEach(cj => {
      totalPiezas += cj.piezas.length;
      totalActivas += cj.piezas.filter(p => p.estado === "activa").length;
      totalReserva += cj.piezas.filter(p => p.estado === "reserva").length;
    });
  });
  return `
    <div class="summary">
      <strong>Resumen:</strong> ${totalCamp} campaña${totalCamp!==1?"s":""} · ${totalConj} conjunto${totalConj!==1?"s":""} · ${totalPiezas} pieza${totalPiezas!==1?"s":""} (${totalActivas} activa${totalActivas!==1?"s":""} + ${totalReserva} reserva)
    </div>
  `;
}

// ============================================
// STEP 6 · PRESUPUESTO
// ============================================
function renderStep6() {
  const modo = state.presupuestoModo;
  const valor = parseMoney(state.presupuestoValor || "");
  const diario = modo === "mensual" && valor ? Math.round(parseInt(valor) / 30) : valor;
  const mensual = modo === "diario" && valor ? parseInt(valor) * 30 : valor;
  const isEvergreen = state.tipoCampana === "evergreen";

  return `
    <div class="step-label">Paso 6 · Presupuesto</div>
    <h2 class="step-question">Configura tu inversión</h2>
    <p class="step-help">El otro se calcula automáticamente.</p>

    <div class="toggle-group">
      <button class="toggle-btn ${modo === 'diario' ? 'active' : ''}" onclick="state.presupuestoModo='diario'; render()">Ingresar diario</button>
      <button class="toggle-btn ${modo === 'mensual' ? 'active' : ''}" onclick="state.presupuestoModo='mensual'; render()">Ingresar mensual</button>
    </div>

    <div class="field">
      <label class="field-label">Presupuesto ${modo === 'diario' ? 'diario' : 'mensual'} (COP)</label>
      <input type="text" class="input" placeholder="0"
        value="${formatMoney(valor)}"
        oninput="state.presupuestoValor = parseMoney(this.value); this.value = formatMoney(state.presupuestoValor); updateCalculos();">
    </div>

    <div class="summary" id="calculos">
      ${modo === 'mensual' ? `<strong>Diario equivalente:</strong> $${formatMoney(diario)} COP` : `<strong>Mensual equivalente:</strong> $${formatMoney(mensual)} COP`}
    </div>

    <div class="field" style="margin-top: 20px;">
      <label class="field-label">Periodo</label>
      <div class="row-2">
        <div>
          <div class="mini-label">Fecha inicio</div>
          <input type="date" class="input" style="padding: 10px 14px;"
            value="${state.fechaInicio}"
            oninput="state.fechaInicio = this.value">
        </div>
        <div>
          <div class="mini-label">Fecha fin ${state.sinFechaFin ? '(deshabilitada)' : ''}</div>
          <input type="date" class="input" style="padding: 10px 14px;"
            ${state.sinFechaFin ? "disabled" : ""}
            value="${state.fechaFin}"
            oninput="state.fechaFin = this.value">
        </div>
      </div>

      ${isEvergreen ? `
        <div class="checkbox-wrap">
          <input type="checkbox" id="sinFechaFin" ${state.sinFechaFin ? "checked" : ""}
            onchange="state.sinFechaFin = this.checked; if(this.checked) state.fechaFin=''; render()">
          <label for="sinFechaFin">Sin fecha fin (campaña evergreen siempre activa)</label>
        </div>
      ` : ""}
    </div>
  `;
}
function updateCalculos() {
  const el = document.getElementById("calculos");
  if (!el) return;
  const modo = state.presupuestoModo;
  const valor = parseMoney(state.presupuestoValor || "");
  if (!valor) {
    el.innerHTML = "<em>Ingresa un valor para ver el cálculo</em>";
    return;
  }
  const diario = modo === "mensual" ? Math.round(parseInt(valor) / 30) : parseInt(valor);
  const mensual = modo === "diario" ? parseInt(valor) * 30 : parseInt(valor);
  el.innerHTML = modo === 'mensual'
    ? `<strong>Diario equivalente:</strong> $${formatMoney(diario)} COP`
    : `<strong>Mensual equivalente:</strong> $${formatMoney(mensual)} COP`;
}

// ============================================
// STEP 7 · EQUIPO
// ============================================
function renderStep7() {
  return `
    <div class="step-label">Paso 7 · Equipo</div>
    <h2 class="step-question">Equipo responsable</h2>
    <p class="step-help">Revisa o edita los emails del equipo asignado.</p>

    <div class="field">
      ${state.equipo.map((m, i) => `
        <div class="team-row">
          <input type="text" placeholder="Rol" value="${escapeHTML(m.rol)}"
            oninput="state.equipo[${i}].rol = this.value">
          <input type="email" placeholder="email@tennispremiumcol.com" value="${escapeHTML(m.email)}"
            oninput="state.equipo[${i}].email = this.value">
          <button class="btn-link btn-danger" onclick="eliminarPersona(${i})" style="font-size: 18px; line-height: 1;">×</button>
        </div>

      <button class="btn-add-dashed" onclick="agregarPersona()">+ Agregar persona</button>

function agregarPersona() {
  state.equipo.push({ rol: "", email: "" });
  render();
}
function eliminarPersona(i) {
  state.equipo.splice(i, 1);
  render();
}

// ============================================
// STEP 8 · PROMPT OUTPUT
// ============================================
function renderPromptOutput() {
  const prompt = generarPromptMaestro();
  return `
    <div class="step-label">Prompt Maestro</div>
    <h2 class="step-question">Prompt listo para Claude Code</h2>
    <p class="step-help">Cópialo y pégalo en Claude Code para que genere el brief + guiones + copy completos.</p>

    <div class="prompt-output" id="promptOutput">${escapeHTML(prompt)}</div>

    <div class="action-buttons">
      <button class="btn btn-primary" onclick="copiarPrompt()">📋 Copiar prompt</button>
      <button class="btn btn-primary" onclick="descargarPrompt()">⬇ Descargar .txt</button>
      <button class="btn btn-secondary" onclick="nuevoBrief()">+ Nueva campaña</button>
    </div>
  `;
}

function generarPromptMaestro() {
  const fecha = new Date().toLocaleDateString('es-CO');
  const tipoCamp = state.tipoCampana === "evergreen" ? "EVERGREEN" : "ESTACIONAL";
  const evento = state.eventoEstacional === "__custom__" ? state.eventoCustom : state.eventoEstacional;
  const ofertaMap = {
    escalonada: "Escalonada por cantidad (1 par envío gratis · 2 pares -10% · 3 pares -15% · 4+ -20%)",
    descuento: "Descuento fijo porcentual",
    "2x1": "2x1 o combos",
    envio: "Envío gratis",
    financiacion: "Financiación destacada (Addi/Sistecrédito)",
    otra: state.otraOferta
  };
  const ofertaDesc = ofertaMap[state.tipoOferta] || "No definida";

  // Contexto Primatón
  let contextoEspecial = "";
  if (evento && evento.includes("Primatón")) {
    contextoEspecial = `
CONTEXTO ESPECIAL · PRIMATÓN:
La Primatón es una campaña de Serrano Group que aprovecha el pago legal de primas en Colombia
(30 de junio y 20 de diciembre), cuando la gente tiene dinero extra disponible.
Los ángulos deben conectar con: "ya tienes con qué, date el gusto", "aprovecha la prima antes
de que se vaya", "sé inteligente con el dinero extra". Urgencia de aprovechar el momento económico.
`;
  }

  let prompt = `# BRIEF DE CAMPAÑA · SERRANO GROUP
# Generado: ${fecha}
# ═══════════════════════════════════════════════════════════

## 1 · IDENTIFICACIÓN
- Empresa: ${state.empresa}
- Campaña: ${state.nombreCampana}
- Tipo: ${tipoCamp}${evento ? ` · ${evento}` : ""}

## 2 · CONTEXTO DE LA CAMPAÑA
${state.contextoCampana || "(No especificado)"}

## 3 · OFERTA
- Tipo: ${ofertaDesc}
- Contexto: ${state.contextoOferta || "(No especificado)"}
${contextoEspecial}
## 4 · MODELOS DISPONIBLES
${state.modelosSeleccionados.map(m => `- ${m}`).join("\n")}

## 5 · ESTRUCTURA META ADS
- Objetivo del brief: ${state.objetivo}

`;

  state.campanas.forEach((c, ci) => {
    prompt += `### CAMPAÑA ${ci + 1}: ${c.nombre}\n\n`;
    c.conjuntos.forEach((conj, cji) => {
      prompt += `#### CONJUNTO ${cji + 1}: ${conj.nombre}\n`;
      prompt += `- Público: ${conj.publico}\n`;
      prompt += `- % presupuesto: ${conj.porcentaje}%\n`;
      prompt += `- Piezas: ${conj.piezas.length}\n\n`;

      conj.piezas.forEach((p, pi) => {
        prompt += `##### PIEZA ${pi + 1} · ${p.id} · ${p.estado.toUpperCase()}\n`;
        prompt += `- Modelo: ${p.modelo}\n`;
        prompt += `- Tipo de pieza: ${p.tipoPieza}${p.tipoPieza === "Carrusel" ? ` (${p.carruselSlides} slides)` : ""}\n`;
        prompt += `- Ángulo: ${p.angulo}\n`;
        prompt += `- Tráfico: ${p.trafico}\n`;
        prompt += `- Nivel conciencia: ${p.conciencia}\n`;
        prompt += `- Motivo: ${p.motivo}\n`;
        prompt += `- Narrativa: ${p.narrativa}\n`;
        prompt += `- Estructura del copy: ${p.estructuraCopy}\n\n`;
      });
    });
  });

  prompt += `
## 6 · PRESUPUESTO
- Modo: ${state.presupuestoModo}
- Valor ${state.presupuestoModo}: $${formatMoney(state.presupuestoValor)} COP
- Fecha inicio: ${state.fechaInicio || "No definida"}
- Fecha fin: ${state.sinFechaFin ? "SIN FECHA FIN (evergreen siempre activa)" : state.fechaFin || "No definida"}

## 7 · EQUIPO
${state.equipo.filter(e => e.rol && e.email).map(e => `- ${e.rol}: ${e.email}`).join("\n")}

# ═══════════════════════════════════════════════════════════
# INSTRUCCIONES PARA CLAUDE CODE
# ═══════════════════════════════════════════════════════════

Actúa como el director creativo y copywriter senior de Serrano Group. Genera el BRIEF COMPLETO
para esta campaña con los siguientes entregables POR CADA PIEZA:

## ENTREGABLES POR PIEZA:

### 1. GUION DE LA PIEZA (siguiendo la estructura del copy elegida)
- Usa la estructura específica que indica cada pieza (PAS/AIDA/FAB/BAB/4U/Storytelling)
- Formatea el guion con marcas de tiempo (0-3s, 3-12s, etc.)
- Incluye indicaciones de tono, ritmo y elementos visuales

### 2. COPY DEL AD PARA META ADS (misma estructura que el guion)
- Primary Text: con la estructura elegida aplicada
- Headline 1: máximo 27 caracteres
- Headline 2: variante alternativa
- Descripción: beneficio principal en 1 frase
- Texto del botón (CTA): acorde al objetivo

## GUÍA DE ESTRUCTURAS:

**PAS:** Problema (hook del dolor) → Agitación (amplifica) → Solución (producto + CTA)
**AIDA:** Atención (hook) → Interés (dato clave) → Deseo (por qué) → Acción (CTA)
**FAB:** Características (tiene X) → Ventajas (permite Y) → Beneficios (mejora tu vida)
**BAB:** Antes (situación) → Después (ahora) → Puente (el producto hizo el cambio)
**4U:** Útil · Urgente · Único · Específico (las 4 cualidades en el mensaje)
**Storytelling:** Historia con personaje + problema + transformación

## TONO OBLIGATORIO:

- Colombiano natural, conversacional
- NO corporativo ni formal
- Si es Video UGC: que se sienta grabado con celular por una persona real
- Si es Imagen estática / Carrusel: más directo
- Si es ángulo "Dolor/Problema": auténtico, no FOMO ni urgencia barata
- Si es ángulo "Beneficios": incluye beneficios de COMPRAR EN TENNISPREMIUM (servicio, garantía, experiencia)
${evento && evento.includes("Primatón") ? "- Primatón: conecta con dinero extra disponible, date el gusto merecido\n" : ""}${evento && (evento.includes("Madre") || evento.includes("Padre")) ? "- Día especial: tono emocional, celebración, gratitud\n" : ""}
## FORMATO DE ENTREGA ESPERADO:

Para cada pieza, entrega en este formato:

\`\`\`
━━━ PIEZA [ID] · [Modelo] ━━━
• Objetivo de la pieza: [1 línea]
• Guion [estructura]:
   [guion formateado con timestamps]
• Copy del ad [estructura]:
   Primary Text:
   [texto]
   Headline 1: [27 chars max]
   Headline 2: [variante]
   Descripción: [breve]
   CTA: [texto botón]
\`\`\`

IMPORTANTE:
- Cada pieza debe tener ALMA PROPIA según sus atributos
- No genérico, no copia-pega entre piezas
- El Context de la campaña y oferta debe estar presente en todos los outputs
- Integrate los insights de ángulo + nivel de conciencia para crear mensajes precisos

Empieza generando el plan en orden: Campaña → Conjunto → Pieza por Pieza.
`;

  return prompt;
}

function copiarPrompt() {
  const prompt = generarPromptMaestro();
  navigator.clipboard.writeText(prompt).then(() => {
    const success = document.getElementById("copySuccess");
    success.classList.add("visible");
    setTimeout(() => success.classList.remove("visible"), 2000);
  }).catch(() => {
    const textarea = document.createElement("textarea");
    textarea.value = prompt;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);
    alert("Prompt copiado ✓");
  });
}
function descargarPrompt() {
  const prompt = generarPromptMaestro();
  const fecha = new Date().toISOString().split("T")[0];
  const nombre = (state.nombreCampana || "campana").replace(/[^\w]/g, "_");
  const blob = new Blob([prompt], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${fecha}_${nombre}_serrano_brief.txt`;
  a.click();
  URL.revokeObjectURL(url);
}
function nuevoBrief() {
  if (!confirm("¿Empezar una nueva campaña? Los datos actuales se perderán.")) return;
  location.reload();
}

// ============================================
// NAVEGACIÓN
// ============================================
function validarPaso(paso) {
  if (paso === 1 && !state.empresa.trim()) return "Ingresa el nombre de la empresa";
  if (paso === 2) {
    if (!state.nombreCampana.trim()) return "Ingresa el nombre de la campaña";
    if (!state.tipoCampana) return "Selecciona evergreen o estacional";
    if (state.tipoCampana === "estacional" && !state.eventoEstacional) return "Selecciona un evento estacional";
    if (state.eventoEstacional === "__custom__" && !state.eventoCustom.trim()) return "Escribe el evento custom";
  }
  if (paso === 3 && !state.tipoOferta) return "Selecciona un tipo de oferta";
  if (paso === 4 && state.modelosSeleccionados.length === 0) return "Selecciona al menos un modelo";
  if (paso === 5) {
    if (!state.objetivo) return "Selecciona el objetivo del brief";
    let totalPiezas = 0;
    state.campanas.forEach(c => c.conjuntos.forEach(cj => totalPiezas += cj.piezas.length));
    if (totalPiezas === 0) return "Agrega al menos una pieza a algún conjunto";
  }
  if (paso === 6) {
    if (!state.presupuestoValor) return "Ingresa el presupuesto";
    if (!state.fechaInicio) return "Ingresa la fecha de inicio";
    if (!state.sinFechaFin && !state.fechaFin) return "Ingresa la fecha de fin o marca evergreen";
  }
  return null;
}

function goNext() {
  const err = validarPaso(state.currentStep);
  if (err) {
    alert("⚠ " + err);
    return;
  }
  if (state.currentStep < 7) {
    state.currentStep++;
  } else if (state.currentStep === 7) {
    state.currentStep = 8;
  }
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function goBack() {
  if (state.currentStep > 1) {
    if (state.currentStep === 8) state.currentStep = 7;
    else state.currentStep--;
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
}

// ============================================
// UTILIDADES
// ============================================
function escapeHTML(str) {
  if (!str) return "";
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}
function escapeAttr(str) {
  return String(str).replace(/'/g, "\\'").replace(/"/g, "&quot;");
}

// Inicializar
render();
</script>
