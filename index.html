<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serrano Campaign Builder v3.2</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
:root {
  --white: #FFFFFF;
  --cream: #FAFAF9;
  --border-light: #EBE9E7;
  --border: #D8D4D0;
  --silver: #BBB4B1;
  --text-soft: #8A8582;
  --carbon: #4B4441;
  --graphite: #333333;
  --shadow: rgba(75, 68, 65, 0.08);
  --danger: #B05A5A;
  --warning: #C89A4E;
  --success: #6B8E6B;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --accent-1: #C8A47E;
  --accent-2: #8FA68E;
  --accent-3: #A59BB5;
  --accent-4: #B89B88;
  --accent-5: #8FA0B5;
}
body { font-family: var(--font); background: var(--cream); color: var(--graphite); margin: 0; padding: 0; line-height: 1.5; -webkit-font-smoothing: antialiased; }
.app { max-width: 860px; margin: 0 auto; min-height: 100vh; background: var(--white); border-left: 0.5px solid var(--border-light); border-right: 0.5px solid var(--border-light); }
.header { padding: 28px 32px 22px; border-bottom: 0.5px solid var(--border-light); background: var(--cream); text-align: center; position: relative; }
.header img { height: 48px; width: auto; margin-bottom: 10px; }
.header-title { font-size: 20px; font-weight: 400; color: var(--graphite); letter-spacing: -0.3px; margin: 0 0 4px; }
.header-sub { font-size: 12px; color: var(--text-soft); font-weight: 300; letter-spacing: 0.3px; margin: 0; }

.body { padding: 20px 32px 28px; }

/* Top bar didáctico */
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 0.5px solid var(--border-light); }
.step-count { font-size: 11px; color: var(--text-soft); letter-spacing: 1px; }
.step-count strong { color: var(--graphite); font-size: 13px; font-weight: 600; }
.help-btn { font-size: 10px; padding: 5px 12px; background: rgba(200,164,126,0.12); color: #8b6a48; border-radius: 14px; font-weight: 600; cursor: pointer; border: none; letter-spacing: 0.3px; font-family: inherit; transition: all 0.2s; }
.help-btn:hover { background: rgba(200,164,126,0.2); }

/* Progreso mejorado */
.progress { display: flex; gap: 4px; margin-bottom: 18px; }
.dot { flex: 1; height: 3px; background: var(--border-light); border-radius: 2px; position: relative; transition: all 0.3s; }
.dot.active { background: var(--graphite); }
.dot.active::after { content: ""; position: absolute; width: 9px; height: 9px; background: var(--graphite); border-radius: 50%; top: -3px; left: 50%; transform: translateX(-50%); box-shadow: 0 0 0 3px rgba(51,51,51,0.18); }
.dot.done { background: var(--accent-2); }

/* Hero card */
.hero { background: linear-gradient(135deg, rgba(200,164,126,0.1), rgba(250,250,249,1)); padding: 18px; border-radius: 12px; margin-bottom: 16px; display: flex; gap: 14px; align-items: center; border: 0.5px solid rgba(200,164,126,0.28); }
.hero-emoji { font-size: 34px; flex-shrink: 0; line-height: 1; }
.hero-content { flex: 1; }
.hero-label { font-size: 10px; color: var(--accent-1); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
.hero-title { font-size: 17px; font-weight: 600; color: var(--graphite); margin-bottom: 3px; letter-spacing: -0.2px; }
.hero-sub { font-size: 11.5px; color: var(--carbon); line-height: 1.4; }

/* Coach */
.coach { background: var(--white); border: 1px dashed var(--accent-1); border-radius: 10px; padding: 11px 13px; display: flex; gap: 11px; margin-bottom: 16px; align-items: flex-start; }
.coach-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--graphite); color: var(--accent-1); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.coach-text { font-size: 11.5px; color: var(--carbon); line-height: 1.5; }
.coach-text strong { color: var(--graphite); }

/* Field mejorado */
.field { margin-bottom: 16px; }
.field-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.field-label { font-size: 10px; color: var(--carbon); letter-spacing: 1.2px; font-weight: 600; text-transform: uppercase; }
.field-label-primary { color: var(--graphite); }
.field-label-primary::before { content: "✦ "; color: var(--accent-1); }
.field-badge { font-size: 9px; color: var(--accent-1); font-weight: 600; letter-spacing: 0.5px; }
.field-optional { font-size: 9px; color: var(--text-soft); font-style: italic; }

.input, .textarea, .select { width: 100%; padding: 11px 14px; background: var(--white); border: 0.5px solid var(--border); border-radius: 8px; color: var(--graphite); font-size: 13px; font-family: inherit; outline: none; transition: all 0.2s; }
.input:focus, .textarea:focus, .select:focus { border-color: var(--carbon); box-shadow: 0 0 0 3px var(--shadow); }
.input::placeholder, .textarea::placeholder { color: var(--silver); font-weight: 300; }
.textarea { resize: vertical; min-height: 70px; line-height: 1.5; }

/* Chips de ejemplos */
.examples-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
.examples-label { font-size: 10px; color: var(--text-soft); font-weight: 600; letter-spacing: 0.3px; }
.example-pill { font-size: 10.5px; padding: 4px 10px; background: var(--cream); border: 0.5px solid var(--border-light); border-radius: 12px; color: var(--carbon); cursor: pointer; transition: all 0.2s; font-family: inherit; border: none; }
.example-pill:hover { background: var(--white); border: 0.5px solid var(--accent-1); color: var(--graphite); }

.char-counter { font-size: 10px; color: var(--text-soft); text-align: right; margin-top: 4px; }

/* Radio cards */
.radio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.radio-card { border: 0.5px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; transition: all 0.2s; background: var(--white); }
.radio-card:hover { border-color: var(--carbon); }
.radio-card.selected { border: 1.5px solid var(--graphite); background: var(--cream); }
.radio-card-title { font-size: 13px; font-weight: 500; color: var(--graphite); margin-bottom: 3px; }
.radio-card-desc { font-size: 11px; color: var(--text-soft); font-weight: 300; }

/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { padding: 6px 12px; background: var(--white); border: 0.5px solid var(--border); border-radius: 16px; font-size: 11px; color: var(--text-soft); cursor: pointer; transition: all 0.2s; user-select: none; }
.chip:hover { border-color: var(--carbon); color: var(--carbon); }
.chip.active { background: var(--graphite); border-color: var(--graphite); color: var(--white); font-weight: 500; }

/* Modelo precio */
.modelo-precio-card { background: var(--cream); border: 0.5px solid var(--border-light); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; transition: all 0.2s; }
.modelo-precio-card.selected { background: var(--white); border: 1px solid var(--graphite); }
.modelo-precio-row { display: flex; align-items: center; gap: 12px; }
.modelo-checkbox { width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid var(--border); background: var(--white); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; font-size: 12px; color: var(--white); transition: all 0.2s; }
.modelo-checkbox.checked { background: var(--graphite); border-color: var(--graphite); }
.modelo-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--graphite); }
.modelo-name.unselected { color: var(--text-soft); }
.price-inputs { display: flex; gap: 6px; align-items: center; }
.price-input { width: 95px; padding: 7px 10px; border: 0.5px solid var(--border); border-radius: 6px; font-size: 11px; font-family: inherit; color: var(--graphite); text-align: right; outline: none; background: var(--white); }
.price-input:focus { border-color: var(--carbon); }
.price-input::placeholder { color: var(--silver); }
.price-label-inline { font-size: 9px; color: var(--text-soft); letter-spacing: 0.5px; font-weight: 600; }

/* Pill */
.pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; background: var(--cream); border: 0.5px solid var(--border-light); border-radius: 12px; font-size: 11px; color: var(--text-soft); margin-top: 8px; }
.pill-dot { width: 4px; height: 4px; background: var(--carbon); border-radius: 50%; }

/* Summary */
.summary { background: var(--cream); border: 0.5px solid var(--border-light); border-radius: 10px; padding: 14px 16px; font-size: 12px; color: var(--text-soft); margin-top: 16px; }
.summary strong { color: var(--graphite); font-weight: 500; }

/* STEP 5 · Asistente creación automática */
.auto-builder { background: linear-gradient(135deg, rgba(200,164,126,0.1), rgba(143,166,142,0.04)); border: 1px solid rgba(200,164,126,0.4); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.auto-builder-title { font-size: 10px; color: var(--accent-1); font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; margin-bottom: 4px; }
.auto-builder-heading { font-size: 14px; font-weight: 600; color: var(--graphite); margin-bottom: 12px; }

.mode-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.mode-card { border: 1px solid var(--border); border-radius: 10px; padding: 12px; cursor: pointer; background: var(--white); transition: all 0.2s; }
.mode-card:hover { border-color: var(--carbon); }
.mode-card.selected { border: 1.5px solid var(--graphite); background: var(--cream); }
.mode-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.mode-icon { font-size: 18px; }
.mode-title { font-size: 12px; font-weight: 600; color: var(--graphite); }
.mode-desc { font-size: 10px; color: var(--text-soft); line-height: 1.3; }

.layer { margin-bottom: 12px; }
.layer-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.layer-icon { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; color: var(--white); font-weight: 600; }
.layer-icon.c1 { background: var(--graphite); }
.layer-icon.c2 { background: var(--accent-1); }
.layer-icon.c3 { background: var(--accent-2); }
.layer-name { font-size: 12px; font-weight: 600; color: var(--graphite); }
.layer-desc { font-size: 10px; color: var(--text-soft); }

.stepper { display: flex; align-items: center; gap: 8px; background: var(--white); border: 0.5px solid var(--border); border-radius: 10px; padding: 6px; }
.stepper-btn { width: 30px; height: 30px; border: none; background: var(--cream); color: var(--graphite); border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.stepper-btn:hover { background: var(--border-light); }
.stepper-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.stepper-val { flex: 1; font-size: 17px; font-weight: 600; color: var(--graphite); text-align: center; }
.stepper-label { font-size: 9.5px; color: var(--text-soft); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; width: 75px; text-align: right; padding-right: 6px; }

.personalized-list { background: var(--white); border-radius: 10px; padding: 12px; border: 0.5px solid var(--border-light); margin-bottom: 12px; }
.conj-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--cream); border-radius: 8px; margin-bottom: 5px; }
.conj-row[data-idx="0"] { border-left: 3px solid var(--accent-1); }
.conj-row[data-idx="1"] { border-left: 3px solid var(--accent-2); }
.conj-row[data-idx="2"] { border-left: 3px solid var(--accent-3); }
.conj-row[data-idx="3"] { border-left: 3px solid var(--accent-4); }
.conj-row[data-idx="4"] { border-left: 3px solid var(--accent-5); }
.conj-row[data-idx="5"] { border-left: 3px solid var(--accent-1); }
.conj-row[data-idx="6"] { border-left: 3px solid var(--accent-2); }
.conj-num { width: 24px; height: 24px; border-radius: 50%; background: var(--white); color: var(--carbon); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.conj-funnel-name { flex: 1; font-size: 11px; color: var(--graphite); font-weight: 500; }
.funnel-badge { font-size: 9px; color: var(--text-soft); background: var(--white); padding: 2px 7px; border-radius: 8px; }

.stepper-mini { display: flex; align-items: center; gap: 4px; background: var(--white); padding: 3px; border-radius: 6px; border: 0.5px solid var(--border); }
.mini-btn { width: 24px; height: 24px; border: none; background: transparent; color: var(--graphite); border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.mini-btn:hover { background: var(--cream); }
.mini-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.mini-val { width: 30px; text-align: center; font-size: 12.5px; font-weight: 600; color: var(--graphite); }

.stats-row { display: flex; gap: 8px; margin-bottom: 12px; }
.stat-card { flex: 1; background: var(--white); border: 0.5px solid var(--border-light); border-radius: 8px; padding: 10px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 700; color: var(--graphite); line-height: 1; }
.stat-label { font-size: 9px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; font-weight: 600; }

.funnel-preview { background: rgba(143,166,142,0.08); border: 0.5px solid rgba(143,166,142,0.3); border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; }
.funnel-preview-title { font-size: 10px; color: #5a7558; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.funnel-items { display: flex; gap: 6px; flex-wrap: wrap; }
.funnel-item { background: var(--white); padding: 4px 9px; border-radius: 10px; font-size: 10px; border: 0.5px solid var(--border-light); color: var(--carbon); }
.funnel-item strong { color: var(--graphite); }

.btn-auto-create { width: 100%; padding: 12px; background: var(--graphite); color: var(--white); border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; font-family: inherit; margin-bottom: 6px; transition: all 0.2s; }
.btn-auto-create:hover { background: var(--carbon); }
.btn-manual { width: 100%; padding: 10px; background: transparent; color: var(--text-soft); border: 0.5px solid var(--border); border-radius: 8px; font-size: 10.5px; font-weight: 500; cursor: pointer; letter-spacing: 0.8px; text-transform: uppercase; font-family: inherit; }
.btn-manual:hover { color: var(--graphite); border-color: var(--carbon); }

/* Campaign/conjunto existente */
.campaign-card { background: var(--cream); border: 0.5px solid var(--border-light); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.campaign-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; margin-bottom: 12px; border-bottom: 0.5px solid var(--border-light); }
.campaign-title { font-size: 13px; font-weight: 500; color: var(--graphite); }
.btn-link { background: none; border: none; color: var(--text-soft); font-size: 11px; cursor: pointer; font-family: inherit; padding: 4px 8px; border-radius: 4px; transition: all 0.15s; }
.btn-link:hover { color: var(--graphite); background: var(--white); }
.btn-danger { color: var(--danger); }
.btn-danger:hover { color: #8E4040; background: #FEF6F6; }
.conjunto-card { background: var(--white); border: 0.5px solid var(--border-light); border-radius: 10px; padding: 14px; margin-bottom: 10px; position: relative; border-left: 3px solid var(--accent-1); transition: all 0.2s; }
.conjunto-card[data-idx="0"] { border-left-color: var(--accent-1); }
.conjunto-card[data-idx="1"] { border-left-color: var(--accent-2); }
.conjunto-card[data-idx="2"] { border-left-color: var(--accent-3); }
.conjunto-card[data-idx="3"] { border-left-color: var(--accent-4); }
.conjunto-card[data-idx="4"] { border-left-color: var(--accent-5); }
.conjunto-card[data-idx="5"] { border-left-color: var(--accent-1); }
.conjunto-card[data-idx="6"] { border-left-color: var(--accent-2); }
.conjunto-card[data-idx="7"] { border-left-color: var(--accent-3); }
.conjunto-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 0.5px solid var(--border-light); }
.conjunto-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 14px; font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.conjunto-badge[data-idx="0"] { background: rgba(200,164,126,0.14); color: #8b6a48; }
.conjunto-badge[data-idx="1"] { background: rgba(143,166,142,0.14); color: #5a7558; }
.conjunto-badge[data-idx="2"] { background: rgba(165,155,181,0.14); color: #6b6080; }
.conjunto-badge[data-idx="3"] { background: rgba(184,155,136,0.14); color: #7f6450; }
.conjunto-badge[data-idx="4"] { background: rgba(143,160,181,0.14); color: #5a6d85; }
.conjunto-badge[data-idx="5"] { background: rgba(200,164,126,0.14); color: #8b6a48; }
.conjunto-badge[data-idx="6"] { background: rgba(143,166,142,0.14); color: #5a7558; }
.conjunto-badge[data-idx="7"] { background: rgba(165,155,181,0.14); color: #6b6080; }

.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.mini-label { font-size: 9px; color: var(--text-soft); margin-bottom: 3px; letter-spacing: 0.8px; font-weight: 600; text-transform: uppercase; }
.mini-input, .mini-select { width: 100%; padding: 7px 10px; background: var(--cream); border: 0.5px solid var(--border); border-radius: 6px; font-size: 11px; color: var(--graphite); font-family: inherit; outline: none; transition: all 0.2s; }
.mini-input:focus, .mini-select:focus { background: var(--white); border-color: var(--carbon); }

/* PIEZA DIDÁCTICA · Paso 9 mejorado */
.pieza-card { background: var(--cream); border: 0.5px solid var(--border-light); border-radius: 10px; padding: 14px; margin-bottom: 10px; transition: all 0.2s; }
.pieza-card.reserva { border-style: dashed; border-color: var(--silver); }
.pieza-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.pieza-title { font-size: 12px; font-weight: 600; color: var(--graphite); letter-spacing: 0.3px; display: flex; align-items: center; gap: 8px; }
.pieza-badge { font-size: 8px; padding: 2px 7px; border-radius: 8px; letter-spacing: 1px; font-weight: 600; text-transform: uppercase; }
.pieza-badge.activa { background: var(--graphite); color: var(--white); }
.pieza-badge.reserva { background: var(--silver); color: var(--white); }

.pieza-subtabs { display: flex; gap: 4px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 0.5px solid var(--border-light); overflow-x: auto; -webkit-overflow-scrolling: touch; }
.pieza-subtab { flex-shrink: 0; padding: 5px 9px; border-radius: 12px; font-size: 10px; color: var(--text-soft); cursor: pointer; white-space: nowrap; border: 0.5px solid transparent; user-select: none; transition: all 0.15s; }
.pieza-subtab.done { color: var(--success); }
.pieza-subtab.active { background: var(--graphite); color: var(--white); font-weight: 600; border-color: var(--graphite); }

.pieza-pill-strip { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; padding: 8px 10px; background: var(--white); border-radius: 8px; }
.pieza-pill { padding: 3px 8px; background: var(--cream); border: 0.5px solid var(--border-light); border-radius: 10px; color: var(--carbon); font-size: 10px; }
.pieza-pill strong { color: var(--graphite); font-weight: 600; }
.pieza-pill.empty { color: var(--silver); font-style: italic; }

.pieza-step-content { background: var(--white); border-radius: 10px; padding: 12px; border: 0.5px solid var(--border-light); }
.pieza-step-header { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
.pieza-step-num { width: 30px; height: 30px; border-radius: 50%; background: var(--graphite); color: var(--white); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
.pieza-step-info { flex: 1; }
.pieza-step-q { font-size: 13px; font-weight: 600; color: var(--graphite); margin-bottom: 2px; }
.pieza-step-sub { font-size: 10px; color: var(--text-soft); line-height: 1.3; }

.cards-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.cards-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.option-card { padding: 10px; background: var(--cream); border: 0.5px solid var(--border-light); border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; }
.option-card:hover { border-color: var(--carbon); }
.option-card.selected { background: var(--white); border: 1.5px solid var(--graphite); }

/* v3.3 · Cards compactas (sub-pasos de pieza y paso 3 estrategia) */
.option-card-compact { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--cream); border: 0.5px solid var(--border-light); border-radius: 7px; cursor: pointer; transition: all 0.15s; text-align: left; min-height: 38px; }
.option-card-compact:hover { border-color: var(--carbon); }
.option-card-compact.selected { background: var(--white); border: 1.5px solid var(--graphite); }
.option-card-compact .opt-icon { font-size: 15px; flex-shrink: 0; line-height: 1; }
.option-card-compact .opt-body { flex: 1; min-width: 0; }
.option-card-compact .opt-title { font-size: 11px; font-weight: 600; color: var(--graphite); line-height: 1.15; }

function formatMoney(num) {
  if (!num) return "0";
  return new Intl.NumberFormat('es-CO').format(parseInt(num));
}
function parseMoney(str) { return String(str).replace(/[^\d]/g, ""); }
function escapeHTML(str) {
  if (!str && str !== 0) return "";
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}
function escapeAttr(str) { return String(str).replace(/'/g,"\\'").replace(/"/g,"&quot;"); }

function selectPlaceholder(title, options, currentValue, onChangeCode, allowCustom = true) {
  const hasCustom = currentValue && !options.includes(currentValue) && currentValue !== "__custom__";
  const selectValue = hasCustom ? "__custom__" : currentValue;
  const isEmpty = !selectValue;
  let html = `<select class="mini-select${isEmpty ? ' placeholder-empty' : ''}" onchange="${onChangeCode}">`;
  html += `<option value="" ${!selectValue ? "selected" : ""}>— Elige ${title.toLowerCase()} —</option>`;
  options.forEach(opt => {
    html += `<option value="${escapeAttr(opt)}" ${selectValue === opt ? "selected" : ""}>${escapeHTML(opt)}</option>`;
  });
  if (allowCustom) html += `<option value="__custom__" ${selectValue === "__custom__" ? "selected" : ""}>+ Otro...</option>`;
  html += `</select>`;
  return html;
}

// v3.7 · Sistema de modal de confirmación propio (reemplaza confirm() bloqueado en sandbox)
let _confirmCallback = null;
function showConfirm(msg, onOk) {
  _confirmCallback = onOk;
  const existing = document.getElementById("__confirm_modal");
  if (existing) existing.remove();
  const modal = document.createElement("div");
  modal.id = "__confirm_modal";
  modal.className = "confirm-modal-backdrop";
  modal.innerHTML = `
    <div class="confirm-modal">
      <div class="confirm-modal-msg">${escapeHTML(msg)}</div>
      <div class="confirm-modal-actions">
        <button class="confirm-modal-btn confirm-modal-cancel" onclick="closeConfirm(false)">Cancelar</button>
        <button class="confirm-modal-btn confirm-modal-ok" onclick="closeConfirm(true)">Confirmar</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}
function closeConfirm(result) {
  const modal = document.getElementById("__confirm_modal");
  if (modal) modal.remove();
  const cb = _confirmCallback;
  _confirmCallback = null;
  if (cb && result) cb();
}

function autoSave() {
  if (autosaveTimer) clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => {
    try {
      const data = JSON.stringify(state);
      // Nota: usamos variable en memoria + sessionStorage donde sea posible
      window._serranoAutosave = data;
      const ind = document.getElementById("autosaveIndicator");
      if (ind) { ind.classList.add("visible"); setTimeout(() => ind.classList.remove("visible"), 1500); }
    } catch (e) { /* no-op */ }
  }, 800);
}

function render() {
  const step = state.currentStep;
  document.getElementById("counter").textContent = `Paso ${step} de 7`;
  document.getElementById("btnBack").disabled = step === 1;
  document.getElementById("btnNext").textContent = step === 7 ? "Generar prompt →" : "Continuar →";

  const body = document.getElementById("body");
  let html = renderTopBar(step) + renderProgress(step);
  if (step === 1) html += renderStep1();
  else if (step === 2) html += renderStep2();
  else if (step === 3) html += renderStep3();
  else if (step === 4) html += renderStep4();
  else if (step === 5) html += renderStep5();
  else if (step === 6) html += renderStep6();
  else if (step === 7) html += renderStep7();
  else if (step === 8) html += renderPromptOutput();
  body.innerHTML = html;

  if (step === 8) {
    document.getElementById("btnNext").style.display = "none";
    document.getElementById("btnBack").textContent = "← Editar";
  } else {
    document.getElementById("btnNext").style.display = "";
    document.getElementById("btnBack").textContent = "← Atrás";
  }
  autoSave();
}

function renderTopBar(step) {
  const mensajesMotivadores = {
    1: "Empezamos 💪",
    2: "Ya vamos bien",
    3: "Definiendo el gancho",
    4: "Catálogo al aire",
    5: "Armando la estructura",
    6: "Casi listos",
    7: "Último paso ✨",
    8: "¡Listo! 🎉"
  };
  return `
    <div class="top-bar">
      <div class="step-count"><strong>Paso ${step === 8 ? 7 : step}</strong> de 7 · <em>${mensajesMotivadores[step] || ""}</em></div>
      ${step < 8 ? `<button class="help-btn" onclick="mostrarAyuda()">💡 ¿Cómo llenar esto?</button>` : ""}
    </div>
  `;
}

function renderProgress(step) {
  let html = '<div class="progress">';
  for (let i = 1; i <= 7; i++) {
    let cls = "dot";
    if (i === step) cls += " active";
    else if (i < step) cls += " done";
    html += `<div class="${cls}"></div>`;
  }
  html += '</div>';
  return html;
}

  if (!state.modelosDescripcion) state.modelosDescripcion = {};
  state.modelosDescripcion[modelo] = valor;
  autoSave();

function toggleModelo(nombre) {
  const idx = state.modelosSeleccionados.indexOf(nombre);
  if (idx >= 0) {
    state.modelosSeleccionados.splice(idx, 1);
    delete state.preciosModelos[nombre];
    if (state.modelosDescripcion) delete state.modelosDescripcion[nombre];
  } else {
    state.modelosSeleccionados.push(nombre);
    state.preciosModelos[nombre] = { antes: "", ahora: "" };
  }
  render();
}
function updatePrecio(modelo, tipo, valor) {
  if (!state.preciosModelos[modelo]) state.preciosModelos[modelo] = { antes: "", ahora: "" };
  state.preciosModelos[modelo][tipo] = parseMoney(valor);
  autoSave();
}
function agregarModelo() {
  const input = document.getElementById("nuevoModelo");
  const valor = input.value.trim();
  if (!valor) return;
  if (!getAllModelos().includes(valor)) {
    state.modelosCustom.push(valor);
    state.modelosSeleccionados.push(valor);
    state.preciosModelos[valor] = { antes: "", ahora: "" };
  }
  input.value = "";
  render();
}

          <button class="stepper-btn" onclick="autoStep('camp', 1)" ${campanas >= 5 ? 'disabled' : ''}>+</button>
          <div class="stepper-label">campaña${campanas > 1 ? 's' : ''}</div>
        </div>
      </div>

      <div class="layer">
        <div class="layer-header">
          <div class="layer-icon c2">📂</div>
          <div>
            <div class="layer-name">Conjuntos por campaña</div>
            <div class="layer-desc">Cada uno con su público y presupuesto</div>
          </div>
        </div>
        <div class="stepper">
          <button class="stepper-btn" onclick="autoStep('conj', -1)" ${conjuntos <= 1 ? 'disabled' : ''}>−</button>
          <div class="stepper-val">${conjuntos}</div>
          <button class="stepper-btn" onclick="autoStep('conj', 1)" ${conjuntos >= 8 ? 'disabled' : ''}>+</button>

        </div>

      ${modo === 'quick' ? `
        <div class="layer">
          <div class="layer-header">
            <div class="layer-icon c3">🎬</div>
            <div>
              <div class="layer-name">Piezas por conjunto</div>
              <div class="layer-desc">Videos, imágenes o carruseles</div>
            </div>
          </div>
          <div class="stepper">
            <button class="stepper-btn" onclick="autoStep('pieza', -1)" ${piezasUniformes <= 1 ? 'disabled' : ''}>−</button>
            <div class="stepper-val">${piezasUniformes}</div>
            <button class="stepper-btn" onclick="autoStep('pieza', 1)" ${piezasUniformes >= 12 ? 'disabled' : ''}>+</button>
            <div class="stepper-label">pieza${piezasUniformes > 1 ? 's' : ''}</div>
          </div>
        </div>
      ` : `
        <div class="personalized-list">
          <div class="layer-header" style="margin-bottom: 10px;">
            <div class="layer-icon c3">🎬</div>
            <div>
              <div class="layer-name">Ajusta piezas por conjunto</div>
              <div class="layer-desc">Tú defines cuántas lleva cada uno</div>
            </div>
          </div>
          ${state.autoPiezasCustom.map((n, i) => {
            return `
              <div class="conj-row" data-idx="${i}">
                <div class="conj-num">${i + 1}</div>
                <div class="conj-funnel-name">Conjunto ${i + 1}</div>
                <div class="stepper-mini">
                  <button class="mini-btn" onclick="autoCustomStep(${i}, -1)" ${n <= 1 ? 'disabled' : ''}>−</button>
                  <div class="mini-val">${n}</div>
                  <button class="mini-btn" onclick="autoCustomStep(${i}, 1)" ${n >= 12 ? 'disabled' : ''}>+</button>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `}

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num">${campanas}</div>
          <div class="stat-label">Campaña${campanas > 1 ? 's' : ''}</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${campanas * conjuntos}</div>
          <div class="stat-label">Conjuntos</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${totalPiezas}</div>
          <div class="stat-label">Piezas total</div>
        </div>
      </div>

      <button class="btn-auto-create" onclick="crearEstructuraAuto()">⚡ Crear estructura · ${totalPiezas} pieza${totalPiezas !== 1 ? 's' : ''}</button>
    </div>
  `;
}

function autoStep(tipo, delta) {
  if (tipo === "camp") {
    const n = Math.max(1, Math.min(5, state.autoCampanas + delta));
    state.autoCampanas = n;
  } else if (tipo === "conj") {
    const n = Math.max(1, Math.min(8, state.autoConjuntos + delta));
    state.autoConjuntos = n;
  } else if (tipo === "pieza") {
    const n = Math.max(1, Math.min(12, state.autoPiezasXConj + delta));
    state.autoPiezasXConj = n;
  }
  render();
}
function autoCustomStep(idx, delta) {
  const current = state.autoPiezasCustom[idx] || 1;
  state.autoPiezasCustom[idx] = Math.max(1, Math.min(12, current + delta));
  render();
}

function crearEstructuraAuto() {
  const modo = state.autoMode;
  const ncamp = state.autoCampanas;
  const nconj = state.autoConjuntos;
  const baseNombre = state.nombreCampana || "Campaña";
  
  state.campanas = [];
  for (let ci = 0; ci < ncamp; ci++) {
    const nombreCamp = ncamp === 1 ? baseNombre : `${baseNombre} ${ci + 1}`;
    const camp = { id: "CA" + Math.random().toString(36).substr(2, 5).toUpperCase(), nombre: nombreCamp, conjuntos: [] };
    for (let cji = 0; cji < nconj; cji++) {
      const nombreConj = `Conjunto ${cji + 1}`;
      const conj = newConjunto(nombreConj, "");
      const nPiezas = modo === "quick" ? state.autoPiezasXConj : (state.autoPiezasCustom[cji] || 1);
      for (let pi = 0; pi < nPiezas; pi++) {
        conj.piezas.push(newPieza("activa"));
      }
      camp.conjuntos.push(conj);
    }
    state.campanas.push(camp);
  }
  // Distribuir % si ABO: dividir 100% entre conjuntos equitativamente
  if (state.tipoPresupuesto === "ABO") {
    state.campanas.forEach(c => {
      const n = c.conjuntos.length;
      const base = Math.floor(100 / n);
      const resto = 100 - (base * n);
      c.conjuntos.forEach((cj, i) => cj.porcentaje = base + (i === 0 ? resto : 0));
    });
  }
  render();
}

function renderCampana(camp, ci) {
  let sumaPorc = 0;
  camp.conjuntos.forEach(cj => sumaPorc += (parseInt(cj.porcentaje) || 0));
  const showPorc = state.tipoPresupuesto === "ABO";
  let porcAlert = "";
  if (showPorc && camp.conjuntos.length > 0) {
    if (sumaPorc === 100) porcAlert = `<div class="budget-ok">✓ Presupuesto asignado: 100% (correcto)</div>`;
    else {
      const diff = 100 - sumaPorc;
      porcAlert = `<div class="budget-warning">⚠ Asignado: ${sumaPorc}% · ${diff > 0 ? 'Falta ' + diff + '%' : 'Sobra ' + Math.abs(diff) + '%'}</div>`;
    }
  }
  return `
    <div class="campaign-card">
      <div class="campaign-header">
        <div class="campaign-title">Campaña ${ci + 1}</div>
        ${state.campanas.length > 1 ? `<button class="btn-link btn-danger" onclick="eliminarCampana(${ci})">Eliminar</button>` : ""}
      </div>
      <div class="field">
        <input type="text" class="input" style="font-size: 12px;"
          placeholder="Nombre de la campaña"
          value="${escapeHTML(camp.nombre)}"
          oninput="state.campanas[${ci}].nombre = this.value; autoSave()">
      </div>
      <div class="mini-label">Conjuntos de anuncio</div>
      ${camp.conjuntos.map((conj, cji) => renderConjunto(conj, ci, cji)).join("")}
      <button class="btn-add-dashed" onclick="agregarConjunto(${ci})">+ Agregar conjunto</button>
      ${porcAlert}
      ${state.tipoCampana === "estacional" && camp.conjuntos.length > 1 && camp.conjuntos[0].piezas.length > 0 ? `
        <button class="btn-duplicate" onclick="duplicarPiezas(${ci})">🔄 Duplicar piezas del Conjunto 1 a los demás</button>
      ` : ""}
    </div>
  `;
}

function renderConjunto(conj, ci, cji) {
  const badgeIdx = cji % 8;
  const showPorc = state.tipoPresupuesto === "ABO";
  const conjLabel = `Conjunto ${cji + 1}`;
  return `
    <div class="conjunto-card" data-idx="${badgeIdx}">
      <div class="conjunto-header">
        <span class="conjunto-badge" data-idx="${badgeIdx}">${conjLabel}</span>
        ${state.campanas[ci].conjuntos.length > 1 ? `<button class="btn-link btn-danger" onclick="eliminarConjunto(${ci}, ${cji})">Eliminar</button>` : ""}
      </div>
      <div class="${showPorc ? 'row-3' : 'row-2'}">
        <div>
          <div class="mini-label">Nombre</div>
          <input type="text" class="mini-input" placeholder="Nombre del conjunto"
            value="${escapeHTML(conj.nombre)}"
            oninput="state.campanas[${ci}].conjuntos[${cji}].nombre = this.value; autoSave()">
        </div>
        <div>
          <div class="mini-label">Público</div>
          ${selectPlaceholder("Público", PUBLICOS, conj.publico, `onChangePublico(${ci}, ${cji}, this.value)`)}
          ${conj.publico === "__custom__" ? `
            <input type="text" class="custom-input-inline" placeholder="Escribe el público"
              value="${escapeHTML(conj.publicoCustom)}"
              oninput="state.campanas[${ci}].conjuntos[${cji}].publicoCustom = this.value; autoSave()">
          ` : ""}
        </div>
        ${showPorc ? `
          <div>
            <div class="mini-label">% presup.</div>
            <input type="number" class="mini-input" min="0" max="100" placeholder="33"
              value="${conj.porcentaje}"
              oninput="state.campanas[${ci}].conjuntos[${cji}].porcentaje = parseInt(this.value) || 0; render()">
          </div>
        ` : ''}
      </div>
      <div class="mini-label" style="margin-top: 10px;">Piezas · ${conj.piezas.length}</div>
      ${conj.piezas.map((p, pi) => renderPiezaDidactica(p, ci, cji, pi)).join("")}
      <div class="pieza-add-row">
        <button class="btn-add-dashed" onclick="agregarPieza(${ci}, ${cji}, 'activa')">+ Pieza activa</button>
        <button class="btn-add-dashed btn-reserva" onclick="agregarPieza(${ci}, ${cji}, 'reserva')">+ Pieza de reserva</button>
      </div>
    </div>
  `;
}
function onChangePublico(ci, cji, valor) {
  state.campanas[ci].conjuntos[cji].publico = valor;
  if (valor !== "__custom__") state.campanas[ci].conjuntos[cji].publicoCustom = "";
  render();
}

// PIEZA DIDÁCTICA con 2 sub-pasos (v3.6 · reducido)
function renderPiezaDidactica(p, ci, cji, pi) {
  const esReserva = p.estado === "reserva";
  const c = p._customs || {};

  // Sub-paso 1 · Esencial: modelo + tipoPieza + trafico + angulo + conciencia + motivo + narrativa
  const s1done = p.modelo && p.tipoPieza && p.trafico && p.angulo && p.conciencia && p.motivo && p.narrativa;
  // Sub-paso 2 · Formato y copy: estructuraCopy + formato (+ duracion si video, slides si carrusel)
  const esVideo = p.tipoPieza && p.tipoPieza.toLowerCase().includes("video");
  const esCarrusel = p.tipoPieza === "Carrusel";
  const s2done = p.estructuraCopy && p.formato && (esVideo ? p.duracion : true) && (esCarrusel ? p.carruselSlides : true);

  // Normalizar subpaso a rango 1-2
  if (p.subpaso > 2) p.subpaso = 2;
  if (!p.subpaso) p.subpaso = 1;

  // Pills resumen arriba
  const pills = [];
  if (p.modelo) pills.push(`Modelo: <strong>${escapeHTML(p.modelo === "__custom__" ? c.modelo || "(custom)" : p.modelo)}</strong>`);
  if (p.tipoPieza) pills.push(`Tipo: <strong>${escapeHTML(p.tipoPieza === "__custom__" ? c.tipoPieza || "(custom)" : p.tipoPieza)}</strong>`);
  if (p.formato) pills.push(`Formato: <strong>${escapeHTML(p.formato === "__custom__" ? c.formato || "(custom)" : p.formato)}</strong>`);
  if (p.duracion) pills.push(`${p.duracion}`);
  if (p.trafico) pills.push(`${escapeHTML(p.trafico === "__custom__" ? c.trafico || "" : p.trafico)}`);
  if (p.angulo) pills.push(`<strong>${escapeHTML(p.angulo === "__custom__" ? c.angulo || "" : p.angulo)}</strong>`);
  if (p.estructuraCopy) pills.push(`<strong>${escapeHTML(p.estructuraCopy)}</strong>`);

  return `
    <div class="pieza-card ${esReserva ? 'reserva' : ''}">
      <div class="pieza-header">
        <div class="pieza-title">
          🎬 Pieza ${pi + 1} · ${p.id}
        </div>
        <div style="display: flex; gap: 6px; align-items: center;">
          <span class="pieza-badge ${esReserva ? 'reserva' : 'activa'}">${esReserva ? 'Reserva' : 'Activa'}</span>
          <button class="btn-link btn-danger" onclick="eliminarPieza(${ci}, ${cji}, ${pi})">×</button>
        </div>
      </div>

      <div class="pieza-subtabs">
        <div class="pieza-subtab ${p.subpaso === 1 ? 'active' : ''} ${s1done ? 'done' : ''}" onclick="setSubpaso(${ci},${cji},${pi},1)">1 · Esencial</div>
        <div class="pieza-subtab ${p.subpaso === 2 ? 'active' : ''} ${s2done ? 'done' : ''}" onclick="setSubpaso(${ci},${cji},${pi},2)">2 · Formato y copy</div>
      </div>

      ${pills.length > 0 ? `<div class="pieza-pill-strip">${pills.map(p => `<span class="pieza-pill">${p}</span>`).join("")}</div>` : ''}

      ${renderSubpaso(p, ci, cji, pi)}

      <div class="pieza-nav">
        <button class="pieza-nav-btn pieza-nav-sec" onclick="navSubpaso(${ci},${cji},${pi},-1)" ${p.subpaso <= 1 ? 'disabled' : ''}>← Atrás</button>
        <button class="pieza-nav-btn pieza-nav-pri" onclick="navSubpaso(${ci},${cji},${pi},1)" ${p.subpaso >= 2 ? 'style="visibility:hidden"' : ''}>Siguiente →</button>
      </div>
    </div>
  `;
}

function setSubpaso(ci, cji, pi, n) {
  state.campanas[ci].conjuntos[cji].piezas[pi].subpaso = n;
  render();
}
function navSubpaso(ci, cji, pi, delta) {
  const p = state.campanas[ci].conjuntos[cji].piezas[pi];
  p.subpaso = Math.max(1, Math.min(2, (p.subpaso || 1) + delta));
  render();
}

          </div>
        </div>

        <div class="mini-label" style="margin-top: 12px;">Tráfico</div>
        <div class="cards-row-tight">

        ${p.angulo === "__custom__" ? `<input type="text" class="custom-input-inline" placeholder="Escribe el ángulo" value="${escapeHTML(c.angulo || '')}" oninput="state.campanas[${ci}].conjuntos[${cji}].piezas[${pi}]._customs.angulo = this.value; autoSave()">` : ""}

        <div class="mini-label" style="margin-top: 12px;">Nivel de conciencia</div>
        <div class="cards-row-tight">
          ${NIVELES_CONCIENCIA.map(n => `
            <div class="option-card-compact ${p.conciencia === n.nombre ? 'selected' : ''}" onclick="updatePiezaField(${ci},${cji},${pi},'conciencia','${n.nombre}')">
              <div class="opt-icon">${n.icon}</div>
              <div class="opt-body">
                <div class="opt-title">${n.nombre}</div>
                <div class="opt-desc">${n.desc}</div>
              </div>
            </div>
          `).join("")}
        </div>

        <div class="mini-label" style="margin-top: 10px;">Motivo emocional</div>
        <div class="cards-row-tight">
          ${MOTIVOS.map(m => `
            <div class="option-card-compact ${p.motivo === m.nombre ? 'selected' : ''}" onclick="updatePiezaField(${ci},${cji},${pi},'motivo','${m.nombre}')">
              <div class="opt-icon">${m.icon}</div>
              <div class="opt-body">
                <div class="opt-title">${m.nombre}</div>
                <div class="opt-desc">${m.desc}</div>
              </div>
            </div>

        ${p.narrativa === "__custom__" ? `<input type="text" class="custom-input-inline" placeholder="Escribe la narrativa" value="${escapeHTML(c.narrativa || '')}" oninput="state.campanas[${ci}].conjuntos[${cji}].piezas[${pi}]._customs.narrativa = this.value; autoSave()">` : ""}

  if (sub === 2) {
    // FORMATO Y COPY: Estructura primero (guion), luego formato, duración, slides
    const esVideo = p.tipoPieza && p.tipoPieza.toLowerCase().includes("video");
    const esCarrusel = p.tipoPieza === "Carrusel";
    return `
      <div class="pieza-step-content">
        <div class="pieza-step-header">
          <div class="pieza-step-num">2</div>
          <div class="pieza-step-info">
            <div class="pieza-step-q">Formato y copy · ¿Cómo va el guion?</div>

}

function updatePiezaField(ci, cji, pi, field, valor) {
  state.campanas[ci].conjuntos[cji].piezas[pi][field] = valor;
  render();
}

function agregarCampana() {
  try {
    state.campanas.push(newCampana(`Campaña ${state.campanas.length + 1}`));
    render();
  } catch(e) { console.error("agregarCampana:", e); }
}
function eliminarCampana(ci) {
  if (ci < 0 || ci >= state.campanas.length) return;
  showConfirm("¿Eliminar esta campaña?", () => {
    state.campanas.splice(ci, 1);
    render();
  });
}
function agregarConjunto(ci) {
  try {
    if (ci < 0 || ci >= state.campanas.length) return;
    const total = state.campanas[ci].conjuntos.length + 1;

function eliminarConjunto(ci, cji) {

function duplicarPiezas(ci) {
  const camp = state.campanas[ci];

  const piezasBase = camp.conjuntos[0].piezas;

  showConfirm(`¿Copiar las ${piezasBase.length} piezas del Conjunto 1 a los demás?`, () => {
    for (let i = 1; i < camp.conjuntos.length; i++) {
      camp.conjuntos[i].piezas = piezasBase.map(p => ({ ...p, id: "P" + Math.random().toString(36).substr(2, 5).toUpperCase(), _customs: { ...(p._customs || {}) } }));
    }
    render();
  });
}
function renderResumen() {
  let totalCamp = state.campanas.length;

  }

  let hayVideos = false;

${contextoEspecial}

${modelosConPrecios}

## 5 · ESTRUCTURA META ADS

`;

  state.campanas.forEach((c, ci) => {

function copiarPrompt() {

  navigator.clipboard.writeText(prompt).then(() => {
    const s = document.getElementById("copySuccess");

    document.execCommand("copy"); document.body.removeChild(t);
    alert("Prompt copiado ✓");
  });
}
function descargarPrompt() {
  const prompt = generarPromptMaestro();
  const fecha = new Date().toISOString().split("T")[0];
  const nombre = (state.nombreCampana || "campana").replace(/[^\w]/g, "_");
  const blob = new Blob([prompt], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `${fecha}_${nombre}_serrano_brief.txt`; a.click();
  URL.revokeObjectURL(url);
}

function validarPaso(paso) {
  if (paso === 1 && !state.empresa.trim()) return "Ingresa el nombre de la empresa";
  if (paso === 2) {
    if (!state.tipoCampana) return "Selecciona evergreen o estacional";
    if (state.tipoCampana === "estacional") {
      if (!state.eventoEstacional) return "Selecciona un evento estacional";
      if (state.eventoEstacional === "__custom__" && !state.eventoCustom.trim()) return "Escribe el nombre del evento custom";
    }
    if (!state.nombreCampana.trim()) return "Ingresa el nombre de la campaña";
  }
  if (paso === 3) {
    if (!state.tipoOferta) return "Selecciona un tipo de oferta";
    if (!state.contextoOferta.trim()) return "Detalla tu oferta";
  }
  if (paso === 4) {
    if (state.modelosSeleccionados.length === 0) return "Selecciona al menos un modelo";
    // Validar descripción por modelo (recomendado pero no obligatorio - solo avisar si falta alguno)
  }
  if (paso === 5) {
    if (!state.objetivo) return "Selecciona el objetivo de la campaña";
    if (!state.tipoPresupuesto) return "Selecciona ABO o CBO";
    let totalPiezas = 0;
    state.campanas.forEach(c => c.conjuntos.forEach(cj => totalPiezas += cj.piezas.length));
    if (totalPiezas === 0) return "Crea la estructura o agrega al menos una pieza";
    if (state.tipoPresupuesto === "ABO") {
      for (let ci = 0; ci < state.campanas.length; ci++) {
        const camp = state.campanas[ci];
        let suma = 0;
        camp.conjuntos.forEach(cj => suma += (parseInt(cj.porcentaje) || 0));
        if (suma !== 100) return `El % del presupuesto de la Campaña ${ci + 1} suma ${suma}% — debe sumar 100%`;
      }
    }
    // Validar conjuntos con público asignado
    for (let ci = 0; ci < state.campanas.length; ci++) {
      const camp = state.campanas[ci];
      for (let cji = 0; cji < camp.conjuntos.length; cji++) {
        const cj = camp.conjuntos[cji];
        if (!cj.publico) return `Falta público en Campaña ${ci+1} · Conjunto ${cji+1}`;
        if (cj.publico === "__custom__" && !cj.publicoCustom.trim()) return `Escribe el público custom de Campaña ${ci+1} · Conjunto ${cji+1}`;
      }
    }
    // Validar cada pieza con todos los campos obligatorios llenos
    for (let ci = 0; ci < state.campanas.length; ci++) {
      const camp = state.campanas[ci];
      for (let cji = 0; cji < camp.conjuntos.length; cji++) {
        const cj = camp.conjuntos[cji];
        for (let pi = 0; pi < cj.piezas.length; pi++) {
          const p = cj.piezas[pi];
          const faltantes = [];
          if (!p.modelo) faltantes.push("modelo");
          if (!p.tipoPieza) faltantes.push("tipo de pieza");
          if (!p.trafico) faltantes.push("tráfico");
          if (!p.angulo) faltantes.push("ángulo");
          if (!p.conciencia) faltantes.push("conciencia");
          if (!p.motivo) faltantes.push("motivo");
          if (!p.narrativa) faltantes.push("narrativa");
          if (!p.estructuraCopy) faltantes.push("estructura de copy");
          if (!p.formato) faltantes.push("formato");
          const esVideo = p.tipoPieza && p.tipoPieza.toLowerCase().includes("video");
          if (esVideo && !p.duracion) faltantes.push("duración");
          if (faltantes.length > 0) {
            return `Campaña ${ci+1} · Conjunto ${cji+1} · Pieza ${pi+1} está incompleta — falta: ${faltantes.join(", ")}`;
          }
        }
      }
    }
    // Aviso de piezas de reserva (no bloquea, solo avisa una vez)
    for (let ci = 0; ci < state.campanas.length; ci++) {
      const camp = state.campanas[ci];
      for (let cji = 0; cji < camp.conjuntos.length; cji++) {
        const cj = camp.conjuntos[cji];
        const hayReserva = cj.piezas.some(p => p.estado === "reserva");
        if (!hayReserva) {
          if (!state._avisoReservaMostrado) {
            state._avisoReservaMostrado = true;
            return `__WARN__Campaña ${ci+1} · Conjunto ${cji+1} no tiene pieza de reserva. Se recomienda al menos 1 para rotar cuando la activa se desgaste.\n\nToca "Continuar" de nuevo para avanzar de todos modos, o agrega una pieza de reserva.`;
          }
        }
      }
    }
  }
  if (paso === 6) {
    if (!state.presupuestoValor) return "Ingresa el presupuesto";
    if (!state.fechaInicio) return "Ingresa la fecha de inicio";
    if (!state.sinFechaFin && !state.fechaFin) return "Ingresa la fecha de fin o marca evergreen";
  }
  return null;
}

function goNext() {
  const err = validarPaso(state.currentStep);
  if (err) {
    if (err.startsWith("__WARN__")) {
      alert("⚠ " + err.substring(8));
      return;
    }
    alert("⚠ " + err);
    return;
  }
  state._avisoReservaMostrado = false;
  if (state.currentStep < 7) state.currentStep++;
  else if (state.currentStep === 7) state.currentStep = 8;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function goBack() {
  if (state.currentStep > 1) {
    if (state.currentStep === 8) state.currentStep = 7;
    else state.currentStep--;
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
}

// v3.8 · Sistema de lock (autenticación simple del equipo)
const LOCK_KEY_V38 = "serrano_session_v38";
// Clave codificada en base64 para no dejarla en texto plano obvio (reversible, no es seguridad real)
const LOCK_HASH = "SnVhblNlcnJhbm8qKg==";

function showLock() {
  document.getElementById("lockScreen").style.display = "flex";
  document.querySelector(".app").style.display = "none";
  setTimeout(() => {
    const input = document.getElementById("lockInput");
    if (input) input.focus();
  }, 100);
}

function hideLock() {
  document.getElementById("lockScreen").style.display = "none";
  document.querySelector(".app").style.display = "";
}

function tryUnlock() {
  const input = document.getElementById("lockInput");
  const err = document.getElementById("lockError");
  const val = input.value;
  if (!val) {
    err.textContent = "Ingresa la contraseña";
    return;
  }
  const expected = atob(LOCK_HASH);
  if (val === expected) {
    try {
      localStorage.setItem(LOCK_KEY_V38, "ok");
    } catch(e) {}
    err.textContent = "";
    input.value = "";
    hideLock();
    render();
  } else {
    err.textContent = "Contraseña incorrecta";
    input.value = "";
    input.focus();
  }
}

function logout() {
  showConfirm("¿Cerrar sesión? Tus campañas seguirán guardadas al volver a entrar.", () => {
    try {
      localStorage.removeItem(LOCK_KEY_V38);
    } catch(e) {}
    showLock();
  });
}

function checkSession() {
  try {
    const ok = localStorage.getItem(LOCK_KEY_V38);
    if (ok === "ok") {
      hideLock();
      return true;
    }
  } catch(e) {}
  showLock();
  return false;
}

// Inicializar: primero chequear sesión, si hay sesión renderizar
if (checkSession()) {
  render();
}
